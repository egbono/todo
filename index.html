function renderAll(){
  const af = state.alleFilter || 'prioritert';
  const baseFilter = t => !t.done && matchesSearch(t) && passesGroupFilter(t);

  if(af === 'prioritert'){
    // Original visning – gruppert etter prioritet med full detalj
    const groups = [['high','Høy prioritet',1],['med','Medium prioritet',2],['low','Lav prioritet',3]];
    return groups.map(([p,label,num])=>{
      const list = state.tasks.filter(t=>t.priority===p && baseFilter(t)).sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
      return `<div class="prio-block">
        <div class="prio-section ${p}">
          <span class="prio-section-name"><span class="prio-section-num">${num}</span>${label}</span>
          <span class="prio-section-count">${list.length}</span>
        </div>
        <div class="drop-zone" data-drop-prio="${p}"></div>
        ${list.map(t=>taskHTML(t)).join('')}
        <div class="drop-zone" data-drop-prio="${p}"></div>
      </div>`;
    }).join('');
  }

  // Sorterings-funksjon for kompakt-modus
  const sortFn = (a,b)=>{
    if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
    const pr = prioRank[a.priority]-prioRank[b.priority];
    if(pr !== 0) return pr;
    return (a.date||'9999').localeCompare(b.date||'9999');
  };

  if(af === 'linje'){
    // Alle oppgaver i kompakt-modus (kun tittel), uten ramme
    const list = state.tasks.filter(t=>baseFilter(t)).sort(sortFn);
    if(!list.length) return `<div class="empty">${ICONS.checks}<p>Ingen oppgaver</p></div>`;
    return list.map(t=>taskHTML(t, {compact:true, draggable:false, showMove:false})).join('');
  }

  // Gruppert visning – sortert etter Gruppe 1 eller Gruppe 2
  if(af === 'group1' || af === 'group2'){
    const setNr = af === 'group1' ? 1 : 2;
    const groupSet = setNr === 1 ? state.groups1 : state.groups2;
    const taskGroupKey = setNr === 1 ? 'group1Id' : 'group2Id';
    const hiddenList = setNr === 1 ? (state.alleGroup1Hidden||[]) : (state.alleGroup2Hidden||[]);
    const allTasks = state.tasks.filter(t=>baseFilter(t));
    if(!allTasks.length) return `<div class="empty">${ICONS.checks}<p>Ingen oppgaver</p></div>`;

    // Sorter grupper etter order
    const sortedGroups = [...groupSet].sort((a,b)=>(a.order||0)-(b.order||0));

    // Tell totalt antall grupper (alle eksisterende + Uten gruppe)
    const totalGroupOptions = groupSet.length + 1; // +1 for "Uten gruppe"
    const hiddenCount = hiddenList.length;
    const visibleCount = totalGroupOptions - hiddenCount;

    // Sjekk om alle rammer er kollapset for å bytte knapp-tekst
    const allCollapseKeys = sortedGroups
      .filter(g=>!hiddenList.includes(g.id))
      .map(g=>`allGroup${setNr}:${g.id}`);
    if(!hiddenList.includes('_none')) allCollapseKeys.push(`allGroup${setNr}:_none`);
    const collapsedSections = state.collapsedSections || {};
    const allCollapsed = allCollapseKeys.length > 0 && allCollapseKeys.every(k=>collapsedSections[k]);
    const toggleLabel = allCollapsed ? 'Åpne alle' : 'Lukk alle';
    const toggleIcon = allCollapsed ? ICONS.chevronDown : ICONS.chevronUp;

    let html = `<div class="alle-group-controls">
      <button class="alle-group-ctrl-btn primary" data-alle-toggle-all="${setNr}">${toggleIcon}<span>${toggleLabel}</span></button>
      <button class="alle-group-ctrl-btn" data-alle-pick-groups="${setNr}">${ICONS.filter}<span>Velg grupper (${visibleCount}/${totalGroupOptions})</span></button>
    </div>`;

    sortedGroups.forEach(g=>{
      if(hiddenList.includes(g.id)) return; // skjult
      const tasksInGroup = allTasks.filter(t=>t[taskGroupKey]===g.id).sort(sortFn);
      if(!tasksInGroup.length) return; // skip tomme grupper
      const rgb = hexToRgb(g.color || '#888780');
      const rowsHTML = tasksInGroup.map(t=>renderGroupedRow(t, setNr)).join('');
      const collapseKey = `allGroup${setNr}:${g.id}`;
      const isCollapsed = !!(state.collapsedSections && state.collapsedSections[collapseKey]);
      html += `<div class="all-group-section ${isCollapsed?'collapsed':''}" style="border-color:${g.color}">
        <div class="all-group-section-header" data-section-collapse="${collapseKey}" style="background:rgba(${rgb},0.18);border-bottom-color:${g.color}">
          <span class="section-collapse-toggle" style="color:${g.color}">${ICONS.chevronDown}</span>
          <span class="all-group-section-badge" style="background:${g.color}">${setNr}</span>
          <span class="all-group-section-title" style="color:${g.color}">${escapeHtml(g.name)}</span>
          <span class="all-group-section-count" style="color:${g.color}">${tasksInGroup.length}</span>
        </div>
        <div class="all-group-section-body">${rowsHTML}</div>
      </div>`;
    });

    // "Uten gruppe"-ramme nederst
    if(!hiddenList.includes('_none')){
      const ungrouped = allTasks.filter(t=>!t[taskGroupKey]).sort(sortFn);
      if(ungrouped.length){
        const rowsHTML = ungrouped.map(t=>renderGroupedRow(t, setNr)).join('');
        const collapseKey = `allGroup${setNr}:_none`;
        const isCollapsed = !!(state.collapsedSections && state.collapsedSections[collapseKey]);
        html += `<div class="all-group-section all-group-section-empty ${isCollapsed?'collapsed':''}">
          <div class="all-group-section-header" data-section-collapse="${collapseKey}">
            <span class="section-collapse-toggle">${ICONS.chevronDown}</span>
            <span class="all-group-section-title">Uten Gruppe ${setNr}</span>
            <span class="all-group-section-count">${ungrouped.length}</span>
          </div>
          <div class="all-group-section-body">${rowsHTML}</div>
        </div>`;
      }
    }

    return html;
  }

  // Filter for spesifikk kategori – vises med ramme i kompakt-modus (likt iPhone X-stil)
  let list, cssClass, headerIcon, title, msg;
  if(af === 'urgent'){
    list = state.tasks.filter(t=>t.category==='urgent' && baseFilter(t)).sort(sortFn);
    cssClass = 'urgent-section'; headerIcon = ICONS.warning; title = 'Haster';
    msg = 'Ingen oppgaver merket Haster';
  } else if(af === 'today'){
    list = state.tasks.filter(t=>t.todayFlag && baseFilter(t)).sort(sortFn);
    cssClass = 'today-section'; headerIcon = ICONS.sun; title = 'I dag';
    msg = 'Ingen oppgaver merket for I dag';
  } else if(af === 'a'){
    list = state.tasks.filter(t=>t.category==='a' && baseFilter(t)).sort(sortFn);
    cssClass = 'cat-a-section'; headerIcon = `<span class="cat-letter-badge cat-a-badge">A</span>`; title = 'A';
    msg = 'Ingen oppgaver merket A';
  } else if(af === 'b'){
    list = state.tasks.filter(t=>t.category==='b' && baseFilter(t)).sort(sortFn);
    cssClass = 'cat-b-section'; headerIcon = `<span class="cat-letter-badge cat-b-badge">B</span>`; title = 'B';
    msg = 'Ingen oppgaver merket B';
  } else if(af === 'c'){
    list = state.tasks.filter(t=>t.category==='c' && baseFilter(t)).sort(sortFn);
    cssClass = 'cat-c-section'; headerIcon = `<span class="cat-letter-badge cat-c-badge">C</span>`; title = 'C';
    msg = 'Ingen oppgaver merket C';
  } else if(af === 'pinned'){
    list = state.tasks.filter(t=>t.pinned && baseFilter(t)).sort(sortFn);
    cssClass = 'pinned-section'; headerIcon = ICONS.starFilled; title = 'Pinnete';
    msg = 'Ingen pinnete oppgaver';
  } else if(af === 'iphone'){
    list = state.tasks.filter(t=>t.iphoneFlag && baseFilter(t)).sort(sortFn);
    cssClass = 'iphone-section'; headerIcon = ICONS.phone; title = 'iPhone-merkede';
    msg = 'Ingen iPhone-merkede oppgaver';
  }

  if(!list || !list.length) return `<div class="empty">${ICONS.checks}<p>${msg}</p></div>`;

  const tasksHTML = list.map(t=>taskHTML(t, {compact:true, draggable:false, showMove:false})).join('');
  return `<div class="${cssClass}">
    <div class="${cssClass}-header">
      ${headerIcon}
      <span class="${cssClass}-title">${title}</span>
      <span class="${cssClass}-count">${list.length}</span>
    </div>
    <div class="${cssClass}-body">${tasksHTML}</div>
  </div>`;
}

function renderDeleted(){
  const list = (state.deletedTasks||[]).filter(t=>{

    if(!q) return true;
    if((t.title||'').toLowerCase().includes(q)) return true;
    if((t.notes||'').toLowerCase().includes(q)) return true;
    return false;
  }).sort((a,b)=>(b.deletedAt||'').localeCompare(a.deletedAt||''));

  if(!list.length){
    return `<div class="empty">${ICONS.trash}<p>Ingen slettede oppgaver</p><p style="font-size:11px;margin-top:6px;color:var(--text-tertiary)">Slettede oppgaver havner her og kan gjenopprettes</p></div>`;
  }

  const rowsHTML = list.map(t=>{
    const deletedDate = t.deletedAt ? new Date(t.deletedAt).toLocaleDateString('nb-NO',{day:'2-digit',month:'2-digit'}) : '';
    const contactTag = (t.contact||'').trim() ? `<div class="task-contact-tag">${ICONS.user}<span>${escapeHtml(t.contact)}</span></div>` : '';

function renderDone(){
  const done = state.tasks.filter(t=>t.done && matchesSearch(t)).sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  if(!done.length) return `<div class="empty">${ICONS.checks}<p>Ingen fullførte oppgaver enda</p></div>`;
  const t0=new Date(); t0.setHours(0,0,0,0);
  const w0=new Date(t0); w0.setDate(w0.getDate()-7);
  const completedToday = done.filter(t=>new Date(t.completedAt)>=t0).length;
  const completedWeek = done.filter(t=>new Date(t.completedAt)>=w0).length;
  const stats = `<div class="done-stats">
    <div class="stat-card"><p class="stat-label">I dag</p><p class="stat-num">${completedToday}</p></div>
    <div class="stat-card"><p class="stat-label">Siste 7 dager</p><p class="stat-num">${completedWeek}</p></div>
  </div>`;
  const grouped = {};
  done.forEach(t=>{const k=t.completedAt?t.completedAt.slice(0,10):'ukjent'; (grouped[k]=grouped[k]||[]).push(t);});
  const keys = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  const groupsHTML = keys.map(k=>{
    const label = k==='ukjent' ? 'Tidligere' : fmtDate(k);
    return `<div class="group-header"><span class="group-name">${label}</span><span class="group-count">${grouped[k].length}</span></div>
      ${grouped[k].map(t=>taskHTML(t,{doneView:true,draggable:false})).join('')}`;
  }).join('');
  const clearBtn = `<div style="margin-top:10px"><button class="fab-btn danger" id="btn-clear-done" style="width:100%">${ICONS.trash} Tøm fullførte (${done.length})</button></div>`;
  return stats + groupsHTML + clearBtn;
}

function renderNotes(){
  const notes = state.notes.filter(matchesSearchNote).sort((a,b)=>(b.date||'').localeCompare(a.date||'') || (b.createdAt||'').localeCompare(a.createdAt||''));
  if(!notes.length) return `<div class="empty">${ICONS.notebook}<p>Ingen notater enda</p><p style="font-size:11px;margin-top:6px;color:var(--text-tertiary)">Trykk "Nytt notat" for å starte</p></div>`;
  const grouped = {};
  notes.forEach(n=>{const k=n.date||'ukjent'; (grouped[k]=grouped[k]||[]).push(n);});
  const keys = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  return keys.map(k=>{
    const label = k==='ukjent' ? 'Uten dato' : fmtDate(k);
    return `<div class="group-header"><span class="group-name">${label}</span><span class="group-count">${grouped[k].length}</span></div>
      ${grouped[k].map(n=>noteCardHTML(n)).join('')}`;
  }).join('');
}

function noteCardHTML(n){
  const isExpanded = state.expandedNotes.has(n.id);
  const desc = n.description && n.description.trim() ? n.description : '';
  const preview = !isExpanded && n.body ? `<p class="note-card-preview">${highlightSearch(n.body)}</p>` : '';
  const full = isExpanded && n.body ? `<div class="note-card-full">${highlightSearch(n.body)}</div>` : '';
  return `<div class="note-card ${isExpanded?'expanded':''}" data-toggle-note-card="${n.id}">
    <div class="note-card-header">
      <div class="note-card-body">
        <p class="note-card-title">${highlightSearch(n.title || 'Uten tittel')}</p>

        ${preview}

      <div class="note-card-actions">
        <button class="icon-btn" data-edit-note="${n.id}" aria-label="Rediger">${ICONS.edit}</button>
        <button class="icon-btn" data-del-note="${n.id}" aria-label="Slett">${ICONS.trash}</button>

}

  const datesSection = `<div class="form-section">
      <div class="form-section-header">
        ${ICONS.calendarEvent}

  const contactSection = `<div class="form-section">
      <div class="form-section-header">
        ${ICONS.user}
        <span class="form-section-title">Kontakt (MinBedrift)</span>
      </div>
      <div class="form-section-body">
        <label class="form-sub-label">Navn | firma</label>
        <input type="text" id="f-contact" value="${escapeAttr(f.contact||'')}" placeholder="Ola Nordmann | Telia AS" />
      </div>
    </div>`;

  const imageSection = `<div class="form-section">
      <div class="form-section-header">
        ${ICONS.camera}
        <span class="form-section-title">Bilder${(f.images&&f.images.length)?' ('+f.images.length+')':''}</span>
      </div>
      <div class="form-section-body">
        <div class="image-row" id="f-image-row">
          ${(f.images||[]).map((img,i)=>`
            <div class="image-thumb" data-img-view="${i}" style="background-image:url('${img}')">
              <button class="image-thumb-remove" data-img-remove="${i}" aria-label="Fjern">${ICONS.x}</button>
            </div>`).join('')}
          <button type="button" class="image-add-btn" id="f-image-add-btn">
            ${ICONS.plus}

          </button>
          <input type="file" id="f-image-camera" accept="image/*" capture="environment" style="display:none" />
          <input type="file" id="f-image-library" accept="image/*" multiple style="display:none" />

  let sectionContent;

  else if(activeTab === 'link') sectionContent = linkSection;
  else if(activeTab === 'contact') sectionContent = contactSection;
  else if(activeTab === 'image') sectionContent = imageSection;
  else sectionContent = titleSection;

  return `<div class="form-screen">
    <div style="display:flex;gap:6px;margin-bottom:10px">

      <button class="form-tab ${activeTab==='groups'?'active':''}" data-form-tab="groups">${ICONS.user}<span>Grupper</span></button>
      <button class="form-tab ${activeTab==='priority'?'active':''}" data-form-tab="priority">${ICONS.flag}<span>Prioritet</span></button>
      <button class="form-tab ${activeTab==='dates'?'active':''}" data-form-tab="dates">${ICONS.calendarEvent}<span>Datoer</span></button>
      <button class="form-tab ${activeTab==='link'?'active':''}" data-form-tab="link">${ICONS.link}<span>Lenke</span></button>
      <button class="form-tab ${activeTab==='contact'?'active':''}" data-form-tab="contact">${ICONS.user}<span>Kontakt</span></button>
      <button class="form-tab ${activeTab==='image'?'active':''}" data-form-tab="image">${ICONS.camera}<span>Bilde</span></button>

}

function wireTasks(){
  // Lukk/Åpne alle rammer i iPhone X
  document.querySelectorAll('[data-iphonex-toggle-all]').forEach(b=>{
    b.addEventListener('click',(e)=>{
      e.stopPropagation();
      const hidden = state.iphoneXHidden || [];
      const allKeys = ['urgent','today','a','b','c','pinned','iphone'].filter(k=>!hidden.includes(k));
      if(!state.collapsedSections) state.collapsedSections = {};
      const allCollapsed = allKeys.length > 0 && allKeys.every(k=>state.collapsedSections[k]);
      if(allCollapsed){
        allKeys.forEach(k=>delete state.collapsedSections[k]);
      } else {
        allKeys.forEach(k=>{ state.collapsedSections[k] = true; });
      }
      save(); render();
    });
  });
  // Velg rammer i iPhone X
  document.querySelectorAll('[data-iphonex-pick-frames]').forEach(b=>{
    b.addEventListener('click',(e)=>{
      e.stopPropagation();
      openIphoneXFrameVisibilityModal();
    });
  });
  // Lukk/Åpne alle grupper i Alle-fanen (gruppe-visning)
  document.querySelectorAll('[data-alle-toggle-all]').forEach(b=>{
    b.addEventListener('click',(e)=>{
      e.stopPropagation();
      const setNr = parseInt(b.dataset.alleToggleAll);
      const groupSet = setNr === 1 ? state.groups1 : state.groups2;
      const hiddenList = setNr === 1 ? (state.alleGroup1Hidden||[]) : (state.alleGroup2Hidden||[]);
      const keys = groupSet.filter(g=>!hiddenList.includes(g.id)).map(g=>`allGroup${setNr}:${g.id}`);
      if(!hiddenList.includes('_none')) keys.push(`allGroup${setNr}:_none`);
      if(!state.collapsedSections) state.collapsedSections = {};
      const allCollapsed = keys.length > 0 && keys.every(k=>state.collapsedSections[k]);
      if(allCollapsed){
        keys.forEach(k=>delete state.collapsedSections[k]);
      } else {
        keys.forEach(k=>{ state.collapsedSections[k] = true; });
      }
      save(); render();
    });
  });
  // Velg grupper å vise i Alle-fanen
  document.querySelectorAll('[data-alle-pick-groups]').forEach(b=>{
    b.addEventListener('click',(e)=>{
      e.stopPropagation();
      const setNr = parseInt(b.dataset.allePickGroups);
      openAlleGroupVisibilityModal(setNr);
    });
  });
  // Gruppe-edit-badger i Alle-fanens gruppe-visning
  document.querySelectorAll('[data-edit-group-on]').forEach(b=>{
    b.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      const setNr = parseInt(b.dataset.editGroupOn);
      const taskId = b.dataset.taskId;
      openGroupChangePicker(taskId, setNr, b);
    });
  });
  // iPhone X-rader åpner redigeringsskjemaet
  document.querySelectorAll('[data-iphonex-filter]').forEach(b=>{
    b.addEventListener('click',()=>{
      state.iphoneXFilter = b.dataset.iphonexFilter;
      save(); render();
    });
  });
  document.querySelectorAll('[data-iphonex-edit]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      // Ikke trigger edit hvis klikket var på grip-håndtaket
      if(e.target.closest('[data-iphonex-grip]')) return;
      const id = el.dataset.iphonexEdit;
      const t = state.tasks.find(x=>x.id===id);
      if(!t) return;
      const mode = (t.subtasks && t.subtasks.length>0) ? 'checklist' : 'notes';
      state.form = {
        title:t.title||'', notes:t.notes||'', subtasks:(t.subtasks||[]).map(s=>({...s})),
        priority:t.priority||'med', date:t.date||todayISO(), futureDate:t.futureDate||'',
        group1Id:t.group1Id||'', group2Id:t.group2Id||'', www:t.www||'', contact:t.contact||'',
        images:(t.images||[]).slice(), pinned:!!t.pinned, iphoneFlag:!!t.iphoneFlag, todayFlag:!!t.todayFlag,
        category:t.category||'none',
        activeTab:'title',
        editingId:t.id, mode
      };
      state.returnView = 'iphonex';
      state.view = 'form';
      save(); render();
    });
  });
  // Dra-håndtak på iPhone X-rader for å flytte mellom seksjoner
  document.querySelectorAll('[data-iphonex-grip]').forEach(grip=>{
    let dragState = null;
    const startDrag = (clientX, clientY, isTouch) => {
      const row = grip.closest('.iphonex-row');
      if(!row) return;
      const id = row.dataset.id;
      const rect = row.getBoundingClientRect();
      const ghost = row.cloneNode(true);
      ghost.style.position = 'fixed';
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      ghost.style.width = rect.width + 'px';
      ghost.style.pointerEvents = 'none';
      ghost.style.opacity = '0.85';
      ghost.style.zIndex = '999';
      ghost.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
      document.body.appendChild(ghost);
      row.classList.add('sort-dragging');
      grip.classList.add('dragging');
      if(isTouch && navigator.vibrate) navigator.vibrate(20);
      dragState = { id, row, grip, ghost, offsetY: clientY - rect.top, lastSection: null };
    };
    const moveDrag = (clientX, clientY) => {
      if(!dragState) return;
      dragState.ghost.style.top = (clientY - dragState.offsetY) + 'px';
      dragState.ghost.style.display = 'none';
      const under = document.elementFromPoint(clientX, clientY);
      dragState.ghost.style.display = '';
      if(dragState.lastSection){
        dragState.lastSection.classList.remove('section-drop-target');
      }
      const targetSection = under ? under.closest('[data-section-target]') : null;
      if(!targetSection){ dragState.lastSection = null; return; }
      // Ikke marker hvis det er samme seksjon (oppgavens nåværende kategori)
      targetSection.classList.add('section-drop-target');
      dragState.lastSection = targetSection;
    };
    const endDrag = () => {
      if(!dragState) return;
      const s = dragState;
      if(s.ghost && s.ghost.parentNode) s.ghost.parentNode.removeChild(s.ghost);
      s.row.classList.remove('sort-dragging');
      s.grip.classList.remove('dragging');
      if(s.lastSection){
        s.lastSection.classList.remove('section-drop-target');
        const target = s.lastSection.dataset.sectionTarget;
        const t = state.tasks.find(x=>x.id===s.id);
        if(t){
          // Alternativ 2A: beholde alle flagg, sett bare det aktuelle
          if(target === 'urgent'){ t.category = 'urgent'; showToast('Flyttet til Haster'); }
          else if(target === 'today'){
            t.todayFlag = true;
            // Fjern kategori så oppgaven havner i I dag-rammen (hierarki: Haster > I dag)
            if(t.category !== 'urgent') t.category = 'none';
            showToast('Flyttet til I dag');
          }
          else if(target === 'a'){ t.category = 'a'; t.todayFlag = false; showToast('Flyttet til A'); }
          else if(target === 'b'){ t.category = 'b'; t.todayFlag = false; showToast('Flyttet til B'); }
          else if(target === 'c'){ t.category = 'c'; t.todayFlag = false; showToast('Flyttet til C'); }
          else if(target === 'pinned'){
            t.pinned = true;
            t.todayFlag = false;
            // Fjern kategori så oppgaven havner i Pinnete
            t.category = 'none';
            showToast('Flyttet til Pinnete');
          }
          else if(target === 'iphone'){
            t.iphoneFlag = true;
            t.todayFlag = false;
            t.category = 'none';
            t.pinned = false;
            showToast('Flyttet til iPhone-merkede');
          }
          save();
        }
      }
      dragState = null;
      render();
    };
    grip.addEventListener('mousedown',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      startDrag(e.clientX, e.clientY, false);
      const onMove = (ev)=>moveDrag(ev.clientX, ev.clientY);
      const onUp = ()=>{
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        endDrag();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    grip.addEventListener('touchstart',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      const t = e.touches[0];
      startDrag(t.clientX, t.clientY, true);
      const onMove = (ev)=>{
        if(!ev.touches[0]) return;
        ev.preventDefault();
        moveDrag(ev.touches[0].clientX, ev.touches[0].clientY);
      };
      const onEnd = ()=>{
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        document.removeEventListener('touchcancel', onEnd);
        endDrag();
      };
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend', onEnd, {passive:true});
      document.addEventListener('touchcancel', onEnd, {passive:true});
    }, {passive:false});
  });
  document.querySelectorAll('[data-toggle-note]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      if(e.target.closest('.icon-btn') || e.target.closest('.checkbox') || e.target.closest('[data-toggle-sub]') || e.target.closest('[data-group-pick]') || e.target.closest('[data-www-link]') || e.target.closest('[data-show-images]') || e.target.closest('.task-grip')) return;
      const id = el.dataset.toggleNote;
      const t = state.tasks.find(x=>x.id===id);
      if(!t || !hasContent(t)) return;
      if(state.expanded.has(id)) state.expanded.delete(id);
      else state.expanded.add(id);
      save(); render();
    });
  });
  document.querySelectorAll('[data-show-images]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = el.dataset.showImages;
      const t = state.tasks.find(x=>x.id===id);
      if(t && t.images && t.images.length) openLightbox(t.images, 0);
    });
  });
  document.querySelectorAll('[data-pin]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = el.dataset.pin;
      const t = state.tasks.find(x=>x.id===id);
      if(!t) return;
      t.pinned = !t.pinned;
      showToast(t.pinned ? 'Pinnet til Dagens' : 'Fjernet fra Dagens');
      save(); render();
    });
  });
  document.querySelectorAll('[data-toggle-iphone]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = el.dataset.toggleIphone;
      const t = state.tasks.find(x=>x.id===id);
      if(!t) return;
      t.iphoneFlag = !t.iphoneFlag;
      showToast(t.iphoneFlag ? 'Lagt til i iPhone' : 'Fjernet fra iPhone');
      save(); render();
    });
  });
  document.querySelectorAll('[data-toggle-today]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = el.dataset.toggleTody || el.dataset.toggleToday;
      const t = state.tasks.find(x=>x.id===id);
      if(!t) return;
      t.todayFlag = !t.todayFlag;
      showToast(t.todayFlag ? 'Merket for I dag' : 'Fjernet I dag-merket');
      save(); render();
    });
  });
  document.querySelectorAll('[data-copy]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = el.dataset.copy;
      const t = state.tasks.find(x=>x.id===id);
      if(!t) return;
      const copy = {
        id: uid('t'),
        title: t.title + ' (kopi)',
        notes: t.notes || '',
        subtasks: (t.subtasks||[]).map(s=>({id:uid('s'), text:s.text, done:false})),
        priority: t.priority,
        date: todayISO(),
        futureDate: t.futureDate || null,
        www: t.www || '',
        contact: t.contact || '',
        images: [], // Bilder kopieres ikke
        group1Id: t.group1Id || null,
        group2Id: t.group2Id || null,
        done: false,
        completedAt: null,
        pinned: false,
        order: 0,
        number: state.nextTaskNumber
      };
      state.nextTaskNumber++;
      state.tasks.push(copy);
      showToast('Oppgave kopiert');
      save(); render();
    });
  });
  wireGripSort();
  wireColumnResize();
  wireDividers();
  document.querySelectorAll('[data-filter-group]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      if(e.target.closest('[data-edit-group]')) return;
      if(e.target.closest('[data-collapse-group]')) return;
      if(e.target.closest('[data-group-grip]')) return;
      e.stopPropagation();
      const [setNrStr, gid] = el.dataset.filterGroup.split('|');
      toggleGroupFilter(parseInt(setNrStr), gid);
    });
  });
  document.querySelectorAll('[data-collapse-group]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      const key = el.dataset.collapseGroup;
      if(!state.collapsedGroups) state.collapsedGroups = {};
      if(state.collapsedGroups[key]) delete state.collapsedGroups[key];
      else state.collapsedGroups[key] = true;
      save(); render();
    });
  });
  document.querySelectorAll('[data-collapse-day]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      const key = el.dataset.collapseDay;
      if(!state.collapsedWeekDays) state.collapsedWeekDays = {};
      if(state.collapsedWeekDays[key]) delete state.collapsedWeekDays[key];
      else state.collapsedWeekDays[key] = true;
      save(); render();
    });
  });
  document.querySelectorAll('[data-section-collapse]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      const key = el.dataset.sectionCollapse;
      if(!state.collapsedSections) state.collapsedSections = {};
      if(state.collapsedSections[key]) delete state.collapsedSections[key];
      else state.collapsedSections[key] = true;
      save(); render();
    });
  });
  wireGroupDrag();
  document.querySelectorAll('[data-edit-group]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      const [setNrStr, gid] = el.dataset.editGroup.split('|');
      openEditGroupModal(parseInt(setNrStr), gid);
    });
  });
  const fce = document.getElementById('filter-clear-empty');
  if(fce) fce.addEventListener('click', clearAllGroupFilters);
  document.querySelectorAll('[data-group-pick]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      const [tid, setNrStr] = el.dataset.groupPick.split('|');
      const setNr = parseInt(setNrStr);
      openGroupPicker(tid, setNr, el);
    });
  });
  document.querySelectorAll('[data-toggle-sub]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const [tid, sid] = el.dataset.toggleSub.split('|');
      const t = state.tasks.find(x=>x.id===tid);
      if(!t) return;
      const s = t.subtasks.find(x=>x.id===sid);
      if(s){ s.done = !s.done; save(); render(); }
    });
  });
  document.querySelectorAll('[data-check]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id=el.dataset.check;
      const t=state.tasks.find(x=>x.id===id);
      if(t){
        t.done=!t.done;
        t.completedAt = t.done ? new Date().toISOString() : null;
        if(t.done){state.expanded.delete(id); showToast('Markert som ferdig');}
        save(); render();
      }
    });

  document.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id=el.dataset.del;
      if(!confirm('Slette denne oppgaven?')) return;
      const t = state.tasks.find(x=>x.id===id);

        // Marker oppgaven som slettet og flytt til deletedTasks

      showToast('Slettet'); save(); render();
    });

  document.querySelectorAll('[data-edit]').forEach(el=>{

      const t=state.tasks.find(x=>x.id===el.dataset.edit);
      if(!t) return;
      const subs = t.subtasks?t.subtasks.map(s=>({...s})):[];

      state.form = {
        title:t.title,
        notes:t.notes||'',
        subtasks:subs,
        priority:t.priority,
        date:t.date,
        futureDate:t.futureDate||'',
        www:t.www||'',
        contact:t.contact||'',

        group2Id:t.group2Id||'',
        pinned:!!t.pinned,
        iphoneFlag:!!t.iphoneFlag,
        todayFlag:!!t.todayFlag,

function applyDropTarget(id, zone){
  const task = state.tasks.find(t=>t.id===id);
  if(!task) return;
  let target = zone;
  if(zone.classList.contains('task')){
    let prev = zone.previousElementSibling;
    while(prev && !prev.dataset.dropDate && !prev.dataset.dropPrio && prev.dataset.dropGroup1===undefined && prev.dataset.dropGroup2===undefined) prev = prev.previousElementSibling;
    if(prev) target = prev;
  }
  let msg = [];
  if(target.dataset.dropDate){ task.date = target.dataset.dropDate; msg.push(fmtDate(task.date)); }
  if(target.dataset.dropPrio){ task.priority = target.dataset.dropPrio; msg.push('prioritet endret'); }
  if(target.dataset.dropGroup1!==undefined){
    task.group1Id = target.dataset.dropGroup1 || null;
    const g = getGroup1(task.group1Id);
    msg.push(g?'til '+g.name:'fra gruppe 1');
  }
  if(target.dataset.dropGroup2!==undefined){
    task.group2Id = target.dataset.dropGroup2 || null;
    const g = getGroup2(task.group2Id);
    msg.push(g?'til '+g.name:'fra gruppe 2');
  }
  if(msg.length) showToast(msg.join(' · '));
  save(); render();
}

// Touch-basert dra (long-press 350ms aktiverer)
let touchDragState = null;
// Grip-h\u00e5ndtak: dra opp/ned for \u00e5 sortere innenfor gruppen
let gripDragState = null;
function wireGroupDrag(){
  let dragState = null;
  document.querySelectorAll('[data-group-grip]').forEach(grip=>{
    const startDrag = (clientX, clientY, isTouch) => {
      const block = grip.closest('[data-group-block]');
      if(!block) return;
      const [setNrStr, gid] = block.dataset.groupBlock.split('|');
      const setNr = parseInt(setNrStr);
      const rect = block.getBoundingClientRect();
      const ghost = block.cloneNode(true);
      ghost.style.position = 'fixed';
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      ghost.style.width = rect.width + 'px';
      ghost.style.pointerEvents = 'none';
      ghost.style.opacity = '0.85';
      ghost.style.zIndex = '999';
      ghost.style.transform = 'rotate(0.5deg) scale(1.01)';
      ghost.style.boxShadow = '0 8px 24px rgba(0,0,0,0.3)';
      ghost.classList.add('task-sort-ghost');
      document.body.appendChild(ghost);
      block.classList.add('group-dragging');
      if(isTouch && navigator.vibrate) navigator.vibrate(20);
      dragState = { setNr, gid, block, ghost, offsetY: clientY - rect.top, lastTarget: null, lastPosition: null };
    };
    const moveDrag = (clientX, clientY) => {
      if(!dragState) return;
      dragState.ghost.style.top = (clientY - dragState.offsetY) + 'px';
      dragState.ghost.style.display = 'none';
      const under = document.elementFromPoint(clientX, clientY);
      dragState.ghost.style.display = '';
      // Rydd opp gamle indikatorer
      if(dragState.lastTarget){
        dragState.lastTarget.classList.remove('group-drop-above','group-drop-below');
      }
      const targetBlock = under ? under.closest('[data-group-block]') : null;
      if(!targetBlock || targetBlock === dragState.block){ dragState.lastTarget = null; dragState.lastPosition = null; return; }
      // Må være samme sett
      const [targetSetStr] = targetBlock.dataset.groupBlock.split('|');
      if(parseInt(targetSetStr) !== dragState.setNr){ dragState.lastTarget = null; return; }
      const tRect = targetBlock.getBoundingClientRect();
      const above = clientY < (tRect.top + tRect.height/2);
      targetBlock.classList.add(above ? 'group-drop-above' : 'group-drop-below');
      dragState.lastTarget = targetBlock;
      dragState.lastPosition = above ? 'above' : 'below';
    };
    const endDrag = () => {
      if(!dragState) return;
      const s = dragState;
      if(s.ghost && s.ghost.parentNode) s.ghost.parentNode.removeChild(s.ghost);
      s.block.classList.remove('group-dragging');
      if(s.lastTarget){
        s.lastTarget.classList.remove('group-drop-above','group-drop-below');
        const [, targetGid] = s.lastTarget.dataset.groupBlock.split('|');
        reorderGroup(s.setNr, s.gid, targetGid, s.lastPosition);
      }
      dragState = null;
    };

    grip.addEventListener('mousedown',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      startDrag(e.clientX, e.clientY, false);
      const onMove = (ev)=>moveDrag(ev.clientX, ev.clientY);
      const onUp = ()=>{
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        endDrag();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    grip.addEventListener('touchstart',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      const t = e.touches[0];
      startDrag(t.clientX, t.clientY, true);
      const onMove = (ev)=>{
        if(!ev.touches[0]) return;
        ev.preventDefault();
        moveDrag(ev.touches[0].clientX, ev.touches[0].clientY);
      };
      const onEnd = ()=>{
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        document.removeEventListener('touchcancel', onEnd);
        endDrag();
      };
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend', onEnd, {passive:true});
      document.addEventListener('touchcancel', onEnd, {passive:true});
    }, {passive:false});
  });
}

function reorderGroup(setNr, srcGid, targetGid, position){
  const groupSet = setNr === 2 ? state.groups2 : state.groups1;
  // Sorter, fjern src, sett inn rundt target, renummerere order
  const sorted = [...groupSet].sort((a,b)=>(a.order||0)-(b.order||0));
  const srcIdx = sorted.findIndex(g=>g.id === srcGid);
  if(srcIdx < 0) return;
  const [src] = sorted.splice(srcIdx, 1);
  const tgtIdx = sorted.findIndex(g=>g.id === targetGid);
  if(tgtIdx < 0) { sorted.push(src); }
  else {
    const insertAt = position === 'below' ? tgtIdx + 1 : tgtIdx;
    sorted.splice(insertAt, 0, src);
  }
  sorted.forEach((g, i)=>{ g.order = (i+1)*10; });
  save(); render();
}

function wireColumnResize(){
  document.querySelectorAll('[data-col-resize]').forEach(handle=>{
    const colId = handle.dataset.colResize;
    // Finn kolonnen til venstre for håndtaket
    const colBlock = handle.previousElementSibling;
    if(!colBlock || !colBlock.classList.contains('colored-group-block')) return;

    let tooltip = null;
    const startResize = (clientX) => {
      handle.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      const startWidth = colBlock.offsetWidth;
      const startX = clientX;
      // Lag tooltip
      tooltip = document.createElement('div');
      tooltip.className = 'col-resize-tooltip';
      tooltip.textContent = startWidth + ' px';
      handle.appendChild(tooltip);
      return {startWidth, startX};
    };
    const updateWidth = (dragData, clientX) => {
      const delta = clientX - dragData.startX;
      const newWidth = Math.max(120, Math.min(500, dragData.startWidth + delta));
      colBlock.style.width = newWidth + 'px';
      if(tooltip) tooltip.textContent = newWidth + ' px';
      return newWidth;
    };
    const endResize = (finalWidth) => {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      if(tooltip && tooltip.parentNode){ tooltip.parentNode.removeChild(tooltip); tooltip = null; }
      if(!state.columnWidths) state.columnWidths = {};
      state.columnWidths[colId] = finalWidth;
      save();
    };

    // MUS
    handle.addEventListener('mousedown',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      const dragData = startResize(e.clientX);
      let finalWidth = dragData.startWidth;
      const onMove = (ev) => { finalWidth = updateWidth(dragData, ev.clientX); };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        endResize(finalWidth);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // TOUCH – listeners på document mens vi drar (slik at fingeren kan bevege seg ut av 8px-håndtaket)
    handle.addEventListener('touchstart',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      const t = e.touches[0];
      const dragData = startResize(t.clientX);
      let finalWidth = dragData.startWidth;
      const onMove = (ev) => {
        if(!ev.touches[0]) return;
        ev.preventDefault();
        finalWidth = updateWidth(dragData, ev.touches[0].clientX);
      };
      const onEnd = () => {
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        document.removeEventListener('touchcancel', onEnd);
        endResize(finalWidth);
      };
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend', onEnd, {passive:true});
      document.addEventListener('touchcancel', onEnd, {passive:true});
    }, {passive: false});

    // Dobbeltklikk: reset til 180px
    handle.addEventListener('dblclick',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      if(!state.columnWidths) state.columnWidths = {};
      delete state.columnWidths[colId];
      colBlock.style.width = '180px';
      save();
      showToast('Kolonnebredde tilbakestilt');
    });
  });
}

      if(isTouch && navigator.vibrate) navigator.vibrate(20);
      gripDragState = {

      };

    const moveDrag = (clientX, clientY) => {

      let targetEl;

        targetEl = under ? under.closest('.task') : null;

      if(!targetEl || targetEl === s.task) { s.lastTarget = null; s.lastPosition = null; return; }
      if(!s.isFlat){
        // I gruppe-visning må target være i samme blokk
        const targetBlock = targetEl.closest('.colored-group-block');
        if(targetBlock !== s.block){ s.lastTarget = null; s.lastPosition = null; return; }
      }

          reorderTask(s.id, targetEl.dataset.id, position);

        return;
      }
      gripDragState = null;
    };

    // Mus
    handle.addEventListener('mousedown',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      startDrag(e.clientX, e.clientY, false);

      const onUp = () => {

      };

      document.addEventListener('touchend', onEnd, {passive: true});
      document.addEventListener('touchcancel', onEnd, {passive: true});

  });

function reorderTask(srcId, targetId, position){
  const src = state.tasks.find(t=>t.id===srcId);
  const target = state.tasks.find(t=>t.id===targetId);
  if(!src || !target || src === target) return;
  // Finn gruppe-aksen basert på visningen
  const view = state.view === 'dagens' ? state.dagensView : state.todayView;
  const groupKey = view === 'group2' ? 'group2Id' : 'group1Id';
  const myGroup = src[groupKey] || null;
  // Hent alle oppgaver i samme gruppe (utenom ferdige), sorter etter eksisterende rekkefølge
  const siblings = state.tasks.filter(x=>!x.done && (x[groupKey]||null) === myGroup);
  siblings.sort((a,b)=>{
    if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
    const pr = prioRank[a.priority]-prioRank[b.priority];
    if(pr !== 0) return pr;
    return (a.date||'9999').localeCompare(b.date||'9999');
  });
  // Fjern src fra listen
  const srcIdx = siblings.indexOf(src);
  if(srcIdx >= 0) siblings.splice(srcIdx, 1);
  // Sett inn på riktig sted i forhold til target
  const tgtIdx = siblings.indexOf(target);
  if(tgtIdx < 0) return;
  const insertAt = position === 'below' ? tgtIdx + 1 : tgtIdx;
  siblings.splice(insertAt, 0, src);
  // Renummerer order
  siblings.forEach((x, idx)=>{ x.order = (idx+1)*10; });
  save(); render();
}

      if(!touchDragState){
        // Hvis brukeren beveger seg f\u00f8r long-press, avbryt timer
        if(Math.abs(t.clientX-startX) > 8 || Math.abs(t.clientY-startY) > 8){
          moved = true;
          if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
        }
        return;
      }
      e.preventDefault();
      const x = t.clientX - touchDragState.offsetX;
      const y = t.clientY - touchDragState.offsetY;
      touchDragState.ghost.style.left = x + 'px';
      touchDragState.ghost.style.top = y + 'px';
      // Finn drop-zone under fingeren
      touchDragState.ghost.style.display = 'none';
      const under = document.elementFromPoint(t.clientX, t.clientY);
      touchDragState.ghost.style.display = '';
      let dropZone = under ? under.closest('.drop-zone, .colored-group-header, .colored-group-body, .task') : null;
      // Mappe gruppe-header/body til drop-zone i samme gruppe-block
      if(dropZone && !dropZone.classList.contains('drop-zone') && !dropZone.classList.contains('task')){
        const block = dropZone.closest('.colored-group-block');
        if(block) dropZone = block.querySelector('.drop-zone[data-drop-group1], .drop-zone[data-drop-group2], .drop-zone[data-drop-date], .drop-zone[data-drop-prio]');
      }
      if(touchDragState.lastZone && touchDragState.lastZone !== dropZone){
        touchDragState.lastZone.classList.remove('over');
      }
      if(dropZone && dropZone.classList.contains('drop-zone')){
        dropZone.classList.add('over');
        touchDragState.lastZone = dropZone;
      } else if(dropZone && dropZone.classList.contains('task') && dropZone !== touchDragState.task){
        // Vis at vi vil flytte over til en annen oppgave (samme gruppe)
        touchDragState.lastZone = dropZone;
      } else {
        touchDragState.lastZone = null;
      }
    }, {passive: false});
    const finish = ()=>{
      if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
      if(!touchDragState) return;
      const zone = touchDragState.lastZone;
      const id = touchDragState.id;
      if(touchDragState.ghost && touchDragState.ghost.parentNode) touchDragState.ghost.parentNode.removeChild(touchDragState.ghost);
      if(touchDragState.task) touchDragState.task.style.opacity = '';
      if(zone){
        zone.classList.remove('over');
        applyDropTarget(id, zone);
      }
      touchDragState = null;
    };
    task.addEventListener('touchend', finish, {passive: true});
    task.addEventListener('touchcancel', finish, {passive: true});
  });
}

function syncFormInputs(){
  const ti=document.getElementById('f-title'); if(ti) state.form.title = ti.value;
  const no=document.getElementById('f-notes'); if(no) state.form.notes = no.value;
  const da=document.getElementById('f-date'); if(da) state.form.date = da.value;
  const fd=document.getElementById('f-future-date'); if(fd) state.form.futureDate = fd.value;
  const ww=document.getElementById('f-www'); if(ww) state.form.www = ww.value;
  const co=document.getElementById('f-contact'); if(co) state.form.contact = co.value;
  const g1=document.getElementById('f-group1'); if(g1) state.form.group1Id = g1.value;
  const g2=document.getElementById('f-group2'); if(g2) state.form.group2Id = g2.value;
  document.querySelectorAll('[data-sub-input]').forEach(inp=>{
    const i = parseInt(inp.dataset.subInput);

function autoResizeTextarea(el){
  if(!el || el.tagName !== 'TEXTAREA') return;
  // Reset height så scrollHeight reflekterer faktisk innhold
  el.style.height = 'auto';
  // Sett ny høyde basert på innhold
  const newHeight = Math.max(el.scrollHeight, 60); // minst 60px
  el.style.height = newHeight + 'px';
}

function wireForm(){
  const ti=document.getElementById('f-title');
  const no=document.getElementById('f-notes');
  const da=document.getElementById('f-date');
  const fd=document.getElementById('f-future-date');
  const ww=document.getElementById('f-www');
  const co=document.getElementById('f-contact');
  if(ti) ti.addEventListener('input',e=>{state.form.title=e.target.value; save();});
  if(no){
    no.addEventListener('input',e=>{state.form.notes=e.target.value; autoResizeTextarea(no); save();});
    // Initial resize ved åpning
    setTimeout(()=>autoResizeTextarea(no), 0);
  }
  if(da) da.addEventListener('input',e=>{state.form.date=e.target.value; save();});
  if(fd) fd.addEventListener('input',e=>{state.form.futureDate=e.target.value; save();});
  if(ww) ww.addEventListener('input',e=>{state.form.www=e.target.value; save();});
  if(co) co.addEventListener('input',e=>{state.form.contact=e.target.value; save();});

  const pinBtn = document.getElementById('f-toggle-pin');
  if(pinBtn) pinBtn.addEventListener('click',()=>{
    syncFormInputs();
    state.form.pinned = !state.form.pinned;
    save(); render();
  });
  const iphoneBtn = document.getElementById('f-toggle-iphone');
  if(iphoneBtn) iphoneBtn.addEventListener('click',()=>{
    syncFormInputs();
    state.form.iphoneFlag = !state.form.iphoneFlag;
    save(); render();
  });
  const todayBtn = document.getElementById('f-toggle-today');
  if(todayBtn) todayBtn.addEventListener('click',()=>{
    syncFormInputs();
    state.form.todayFlag = !state.form.todayFlag;
    save(); render();
  });
  document.querySelectorAll('[data-set-category]').forEach(b=>{
    b.addEventListener('click',()=>{
      syncFormInputs();
      state.form.category = b.dataset.setCategory;
      save(); render();
    });
  });
  document.querySelectorAll('[data-form-tab]').forEach(b=>{
    b.addEventListener('click',()=>{
      syncFormInputs();
      state.form.activeTab = b.dataset.formTab;
      save(); render();
    });
  });

  // Gruppe-velger: native select
  const g1=document.getElementById('f-group1');
  const g2=document.getElementById('f-group2');
  if(g1) g1.addEventListener('change',e=>{
    syncFormInputs();
    state.form.group1Id = e.target.value || '';
    save();
  });
  if(g2) g2.addEventListener('change',e=>{
    syncFormInputs();
    state.form.group2Id = e.target.value || '';
    save();
  });

  // Gruppe-s\u00f8k filtrerer options i rullegardin
  document.querySelectorAll('.group-search-input').forEach(input=>{
    input.addEventListener('input',(e)=>{
      const setNr = e.target.dataset.groupSearch;
      const q = e.target.value.trim().toLowerCase();
      const select = document.getElementById(setNr==='2' ? 'f-group2' : 'f-group1');
      if(!select) return;
      let visibleCount = 0;
      let firstMatch = null;
      Array.from(select.options).forEach(opt=>{
        const name = opt.dataset.groupName || '';
        const isNone = opt.value === '';
        let show;
        if(!q){ show = true; }
        else if(isNone){ show = false; }
        else { show = name.includes(q); }
        opt.hidden = !show;
        opt.disabled = !show;
        if(show){
          visibleCount++;
          if(!firstMatch && !isNone) firstMatch = opt;
        }
      });
      // Hvis aktivt valg er skjult og det er treff, foresl\u00e5 f\u00f8rste
      if(q && firstMatch && select.options[select.selectedIndex] && select.options[select.selectedIndex].hidden){
        select.value = firstMatch.value;
        const event = new Event('change', {bubbles:true});
        select.dispatchEvent(event);
      }
    });
  });

  // Bilde-h\u00e5ndtering
  const handleImageFiles = async (files) => {
    if(!files.length) return;
    syncFormInputs();
    let added = 0;
    for(const file of files){
      try {
        const dataUrl = await compressImage(file);
        state.form.images = state.form.images || [];
        state.form.images.push(dataUrl);
        added++;
      } catch(err){
        showToast('Klarte ikke laste: '+file.name);
      }
    }
    if(added > 0){
      try {
        save();
        showToast(added===1 ? '1 bilde lagt til' : added+' bilder lagt til');
      } catch(err){
        state.form.images = state.form.images.slice(0, state.form.images.length - added);
        alert('Lagringsplassen er full. Slett bilder fra andre oppgaver eller eksporter backup først.');
      }
    }
    render();
  };

  const camInput = document.getElementById('f-image-camera');
  const libInput = document.getElementById('f-image-library');
  const filesInput = document.getElementById('f-image-files');
  if(camInput) camInput.addEventListener('change', async (e)=>{
    await handleImageFiles(Array.from(e.target.files || []));
    e.target.value = '';
  });
  if(libInput) libInput.addEventListener('change', async (e)=>{
    await handleImageFiles(Array.from(e.target.files || []));
    e.target.value = '';
  });
  if(filesInput) filesInput.addEventListener('change', async (e)=>{
    await handleImageFiles(Array.from(e.target.files || []));
    e.target.value = '';
  });

  const addBtn = document.getElementById('f-image-add-btn');
  if(addBtn) addBtn.addEventListener('click', (e)=>{
    e.preventDefault();
    openImageSourcePicker();
  });

  document.querySelectorAll('[data-img-remove]').forEach(b=>{
    b.addEventListener('click',(e)=>{
      e.stopPropagation();
      e.preventDefault();
      syncFormInputs();
      const i = parseInt(b.dataset.imgRemove);
      state.form.images.splice(i, 1);
      save(); render();
    });
  });

  document.querySelectorAll('[data-img-view]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      if(e.target.closest('[data-img-remove]')) return;
      const i = parseInt(el.dataset.imgView);
      openLightbox(state.form.images, i);
    });
  });
  document.querySelectorAll('[data-prio]').forEach(b=>b.addEventListener('click',()=>{syncFormInputs(); state.form.priority=b.dataset.prio; save(); render();}));
  document.querySelectorAll('[data-mode]').forEach(b=>{
    b.addEventListener('click',()=>{
      syncFormInputs();
      state.form.mode = b.dataset.mode;
      if(state.form.mode==='checklist' && !state.form.subtasks.length){
        state.form.subtasks = [{id:uid('s'),text:'',done:false}];
      }
      save(); render();
      setTimeout(()=>{
        if(state.form.mode==='checklist'){
          const first = document.querySelector('[data-sub-input="0"]');
          if(first) first.focus();
        } else {
          const ta = document.getElementById('f-notes');
          if(ta) ta.focus();
        }
      },50);
    });
  });
  document.querySelectorAll('[data-sub-input]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const i = parseInt(inp.dataset.subInput);
      if(state.form.subtasks[i]) state.form.subtasks[i].text = e.target.value;
      save();
    });
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        syncFormInputs();
        const i = parseInt(inp.dataset.subInput);
        state.form.subtasks.splice(i+1, 0, {id:uid('s'),text:'',done:false});
        save(); render();
        setTimeout(()=>{
          const next = document.querySelector(`[data-sub-input="${i+1}"]`);
          if(next) next.focus();
        },50);
      } else if(e.key==='Backspace' && !inp.value && state.form.subtasks.length>1){
        e.preventDefault();
        syncFormInputs();
        const i = parseInt(inp.dataset.subInput);
        state.form.subtasks.splice(i,1);
        save(); render();
        setTimeout(()=>{
          const prev = document.querySelector(`[data-sub-input="${Math.max(0,i-1)}"]`);
          if(prev){prev.focus(); prev.setSelectionRange(prev.value.length, prev.value.length);}
        },50);
      }
    });
  });
  document.querySelectorAll('[data-sub-check]').forEach(b=>{
    b.addEventListener('click',()=>{
      syncFormInputs();
      const i = parseInt(b.dataset.subCheck);
      state.form.subtasks[i].done = !state.form.subtasks[i].done;
      save(); render();
    });
  });
  document.querySelectorAll('[data-sub-remove]').forEach(b=>{
    b.addEventListener('click',()=>{
      syncFormInputs();
      const i = parseInt(b.dataset.subRemove);
      state.form.subtasks.splice(i,1);
      if(!state.form.subtasks.length) state.form.subtasks = [{id:uid('s'),text:'',done:false}];
      save(); render();
    });
  });
  const sa = document.getElementById('sub-add');
  if(sa) sa.addEventListener('click',()=>{
    syncFormInputs();
    state.form.subtasks.push({id:uid('s'),text:'',done:false});
    save(); render();
    setTimeout(()=>{
      const last = document.querySelector(`[data-sub-input="${state.form.subtasks.length-1}"]`);
      if(last) last.focus();
    },50);
  });
  const ng1=document.getElementById('f-new-group1'); if(ng1) ng1.addEventListener('click',()=>openGroupModal(1));
  const ng2=document.getElementById('f-new-group2'); if(ng2) ng2.addEventListener('click',()=>openGroupModal(2));
  const fCancelBtn = document.getElementById('f-cancel-top');
  if(fCancelBtn) fCancelBtn.addEventListener('click',()=>{
    const ret = state.returnView || 'today';
    state.view = ret;
    state.returnView = null;
    state.form={title:'',notes:'',subtasks:[],priority:'med',date:todayISO(),futureDate:'',group1Id:'',group2Id:'',www:'',contact:'',images:[],pinned:false,iphoneFlag:false,todayFlag:false,category:'none',activeTab:'title',editingId:null,mode:'notes'};
    save(); render();
  });
  document.getElementById('f-save-top').addEventListener('click',()=>{
    syncFormInputs();
    if(!state.form.title.trim()){showToast('Skriv inn en tittel'); return;}
    const isCl = state.form.mode==='checklist';
    const cleanSubs = isCl ? state.form.subtasks.filter(s=>s.text.trim()).map(s=>({id:s.id||uid('s'),text:s.text.trim(),done:!!s.done})) : [];
    const cleanNotes = isCl ? '' : state.form.notes;
    const payload = {
      title:state.form.title.trim(),
      notes:cleanNotes,
      subtasks:cleanSubs,
      priority:state.form.priority,
      date:state.form.date,
      futureDate:state.form.futureDate||null,
      www:(state.form.www||'').trim(),
      contact:(state.form.contact||'').trim(),
      images:(state.form.images||[]).slice(),
      group1Id:state.form.group1Id||null,
      group2Id:state.form.group2Id||null,
      pinned:!!state.form.pinned,
      iphoneFlag:!!state.form.iphoneFlag,
      todayFlag:!!state.form.todayFlag,
      category:state.form.category||'none'
    };
    try {
      if(state.form.editingId){
        const t=state.tasks.find(x=>x.id===state.form.editingId);
        Object.assign(t, payload);
        showToast('Oppdatert');
      } else {
        state.tasks.push(Object.assign({id:uid('t'),done:false,completedAt:null,number:state.nextTaskNumber}, payload));
        state.nextTaskNumber++;
        showToast('Lagt til');
      }
      state.form={title:'',notes:'',subtasks:[],priority:'med',date:todayISO(),futureDate:'',group1Id:'',group2Id:'',www:'',contact:'',images:[],pinned:false,iphoneFlag:false,todayFlag:false,category:'none',activeTab:'title',editingId:null,mode:'notes'};
      const ret = state.returnView || 'today';
      state.view = ret;
      state.returnView = null;
      save(); render();
    } catch(err){
      alert('Lagring feilet. Hvis du har lagt til bilder, kan lagringsplassen være full. Eksporter backup og prøv igjen.');
    }
  });
}

function openLightbox(images, startIndex){
  if(!images || !images.length) return;
  let idx = Math.max(0, Math.min(startIndex||0, images.length-1));
  const host = document.getElementById('modal-host');
  const render = () => {
    const navBtns = images.length > 1 ? `
      <button class="lightbox-nav prev" id="lb-prev" aria-label="Forrige">${ICONS.chevron ? '◀' : '<'}</button>
      <button class="lightbox-nav next" id="lb-next" aria-label="Neste">${ICONS.chevron ? '▶' : '>'}</button>
      <div class="lightbox-counter">${idx+1} / ${images.length}</div>
    ` : '';
    host.innerHTML = `<div class="lightbox" id="lb-bg">
      <button class="lightbox-close" id="lb-close" aria-label="Lukk">${ICONS.x}</button>
      ${navBtns}
      <img src="${images[idx]}" alt="Bilde ${idx+1}" />
    </div>`;
    document.getElementById('lb-bg').addEventListener('click',e=>{if(e.target.id==='lb-bg') host.innerHTML='';});
    document.getElementById('lb-close').addEventListener('click',()=>host.innerHTML='');
    const prev = document.getElementById('lb-prev');
    if(prev) prev.addEventListener('click',(e)=>{e.stopPropagation(); idx=(idx-1+images.length)%images.length; render();});
    const next = document.getElementById('lb-next');
    if(next) next.addEventListener('click',(e)=>{e.stopPropagation(); idx=(idx+1)%images.length; render();});
  };
  render();
}

function openGroupPicker(taskId, setNr, anchorEl){
  closeGroupPicker();
  const task = state.tasks.find(t=>t.id===taskId);
  if(!task) return;
  const groupSet = [...(setNr===2 ? state.groups2 : state.groups1)].sort((a,b)=>a.name.localeCompare(b.name, 'nb', {sensitivity:'base'}));
  const currentId = setNr===2 ? task.group2Id : task.group1Id;

  const items = groupSet.map(g=>
    `<div class="group-popup-item ${g.id===currentId?'selected':''}" data-pick-group="${g.id}">
      <span class="group-dot" style="background:${g.color}"></span>
      <span style="flex:1">${escapeHtml(g.name)}</span>
      ${g.id===currentId?ICONS.check:''}
    </div>`).join('');

  const removeItem = currentId ? `
    <div class="group-popup-divider"></div>
    <div class="group-popup-item danger" data-pick-group="">
      ${ICONS.x}
      <span>Fjern gruppe</span>
    </div>` : '';

  const newGroupItem = `
    <div class="group-popup-divider"></div>
    <div class="group-popup-item" data-new-group="${setNr}" style="color:var(--text-info)">
      ${ICONS.plus}
      <span>Ny gruppe...</span>
    </div>`;

  const backdrop = document.createElement('div');
  backdrop.className = 'group-popup-backdrop';
  backdrop.id = 'group-popup-backdrop';
  document.body.appendChild(backdrop);

  const popup = document.createElement('div');
  popup.className = 'group-popup';
  popup.id = 'group-popup';
  popup.innerHTML = `
    <div class="group-popup-label">Gruppe ${setNr}</div>
    ${items || '<div style="font-size:11px;color:var(--text-tertiary);padding:6px 9px">Ingen grupper enda</div>'}
    ${removeItem}
    ${newGroupItem}
  `;
  document.body.appendChild(popup);

  // Plasser popup nær ankerelementet
  const rect = anchorEl.getBoundingClientRect();
  const popupRect = popup.getBoundingClientRect();
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  let left = rect.left;
  if(left + popupRect.width > vw - 10) left = vw - popupRect.width - 10;
  if(left < 10) left = 10;
  let top = rect.bottom + 4;
  if(top + popupRect.height > vh - 10) top = rect.top - popupRect.height - 4;
  if(top < 10) top = 10;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';

  backdrop.addEventListener('click', closeGroupPicker);
  backdrop.addEventListener('touchstart', closeGroupPicker);

  popup.querySelectorAll('[data-pick-group]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const newId = el.dataset.pickGroup || null;
      if(setNr===2) task.group2Id = newId;
      else task.group1Id = newId;
      closeGroupPicker();
      const g = newId ? (setNr===2?getGroup2(newId):getGroup1(newId)) : null;
      showToast(g ? 'Satt til '+g.name : 'Gruppe fjernet');
      save(); render();
    });
  });

  const newBtn = popup.querySelector('[data-new-group]');
  if(newBtn) newBtn.addEventListener('click',(e)=>{
    e.stopPropagation();
    closeGroupPicker();
    openInlineGroupModal(setNr, (newGroup)=>{
      if(setNr===2) task.group2Id = newGroup.id;
      else task.group1Id = newGroup.id;
      save(); render();
    });
  });
}

  const groupSet = [...(setNr===2 ? state.groups2 : state.groups1)].sort((a,b)=>a.name.localeCompare(b.name,'nb',{sensitivity:'base'}));
  let searchQuery = '';

  const renderModal = () => {
    const filterArr = setNr===2 ? state.group2Filter : state.group1Filter;
    const q = searchQuery.trim().toLowerCase();
    const filtered = q ? groupSet.filter(g=>g.name.toLowerCase().includes(q)) : groupSet;
    const items = filtered.map(g=>{
      const active = filterArr.includes(g.id);
      return `<div class="filter-modal-item" data-pick-filter="${g.id}">
        <div class="filter-modal-check ${active?'checked':''}">${active?ICONS.check:''}</div>
        <span class="filter-modal-dot" style="background:${g.color}"></span>
        <span class="filter-modal-name">${escapeHtml(g.name)}</span>
      </div>`;
    }).join('');
    const noneActive = filterArr.includes('_none');
    const noneItem = !q ? `<div class="filter-modal-item" data-pick-filter="_none">
      <div class="filter-modal-check ${noneActive?'checked':''}">${noneActive?ICONS.check:''}</div>
      <span class="filter-modal-dot" style="background:#888780"></span>
      <span class="filter-modal-name" style="color:var(--text-secondary)">Uten gruppe</span>
    </div>` : '';
    host.innerHTML = `<div class="filter-modal-bg" id="filter-modal-bg">
      <div class="filter-modal">
        <div class="filter-modal-header">
          ${ICONS.filter}
          <span class="filter-modal-title">Filtrer Gruppe ${setNr}</span>

function openExportModal(){

      <p style="font-size:12px;color:var(--text-secondary);margin:0 0 12px;line-height:1.5">Eksporter alle data til fil for sikkerhetskopi eller import i andre systemer.</p>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="fab-btn" id="ex-json">${ICONS.download} Eksporter JSON (komplett)</button>
        <button class="fab-btn" id="ex-csv-tasks">${ICONS.download} Eksporter CSV (oppgaver)</button>
        <button class="fab-btn" id="ex-csv-notes">${ICONS.download} Eksporter CSV (notater)</button>
        <button class="fab-btn" id="ex-import">${ICONS.upload} Importer JSON</button>
        <input type="file" id="ex-import-file" accept=".json,application/json" style="display:none" />
      </div>
      <div class="modal-actions" style="margin-top:14px">
        <button class="fab-btn" id="ex-close" style="flex:1">Lukk</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')host.innerHTML='';});
  document.getElementById('ex-close').addEventListener('click',()=>host.innerHTML='');
  document.getElementById('ex-json').addEventListener('click',()=>{exportJSON(); host.innerHTML='';});
  document.getElementById('ex-csv-tasks').addEventListener('click',()=>{exportCSVTasks(); host.innerHTML='';});
  document.getElementById('ex-csv-notes').addEventListener('click',()=>{exportCSVNotes(); host.innerHTML='';});
  document.getElementById('ex-import').addEventListener('click',()=>document.getElementById('ex-import-file').click());
  document.getElementById('ex-import-file').addEventListener('change',e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const data = JSON.parse(ev.target.result);
        if(!confirm('Importere data fra fil? Eksisterende oppgaver og notater erstattes.')) return;
        if(data.tasks) state.tasks = data.tasks.map(t=>({
          id:t.id||uid('t'), title:t.title||'', notes:t.notes||'',
          subtasks:t.subtasks||[], priority:t.priority||'med',
          date:t.due_date||t.date||todayISO(),
          futureDate:t.future_date||t.futureDate||null,
          www:t.www||'',
          contact:t.contact||'',
          images: Array.isArray(t.images) ? t.images : [],
          done:!!t.completed,
          completedAt:t.completed_at||t.completedAt||null,
          pinned: !!(t.pinned),
          iphoneFlag: !!(t.iphone_flag || t.iphoneFlag),
          todayFlag: !!(t.today_flag || t.todayFlag),
          category: ['none','urgent','a','b','c'].includes(t.category) ? t.category : 'none',
          order: typeof t.order === 'number' ? t.order : 0,
          number: typeof t.number === 'number' ? t.number : null,
          group1Id:t.group1_id||t.group1Id||t.group_id||t.groupId||null,
          group2Id:t.group2_id||t.group2Id||null
        }));
        if(Array.isArray(data.deleted_tasks)) state.deletedTasks = data.deleted_tasks.map(t=>({
          id:t.id||uid('t'), title:t.title||'', notes:t.notes||'',
          subtasks:t.subtasks||[], priority:t.priority||'med',
          date:t.due_date||t.date||todayISO(),
          futureDate:t.future_date||t.futureDate||null,
          www:t.www||'', contact:t.contact||'',
          images: Array.isArray(t.images) ? t.images : [],
          pinned: !!(t.pinned),
          iphoneFlag: !!(t.iphone_flag || t.iphoneFlag),
          todayFlag: !!(t.today_flag || t.todayFlag),
          category: ['none','urgent','a','b','c'].includes(t.category) ? t.category : 'none',
          order: typeof t.order === 'number' ? t.order : 0,
          number: typeof t.number === 'number' ? t.number : null,
          group1Id: t.group1_id||t.group1Id||null,
          group2Id: t.group2_id||t.group2Id||null,
          deletedAt: t.deleted_at || t.deletedAt || new Date().toISOString()
        }));
        if(data.notes) state.notes = data.notes.map(n=>({
          id:n.id||uid('n'), title:n.title||'', description:n.description||'',
          body:n.body||'', date:n.date||todayISO(),
          createdAt:n.created_at||n.createdAt||new Date().toISOString()
        }));
        if(data.groups1) state.groups1 = data.groups1;
        else if(data.groups) state.groups1 = data.groups;
        if(data.groups2) state.groups2 = data.groups2;
        if(Array.isArray(data.dividers)) state.dividers = data.dividers;
        if(typeof data.next_task_number === 'number') state.nextTaskNumber = data.next_task_number;
        // Tildele numre til eventuelt oppgaver som mangler det
        const unnumbered = state.tasks.filter(t=>typeof t.number !== 'number');
        unnumbered.sort((a,b)=>(a.id||'').localeCompare(b.id||''));
        unnumbered.forEach(t=>{ t.number = state.nextTaskNumber; state.nextTaskNumber++; });
        save(); render();
        host.innerHTML='';
        showToast('Importert');
      }catch(err){
        alert('Klarte ikke å lese filen: '+err.message);
      }
    };
    reader.readAsText(file);
  });
}

function download(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},100);
}

function openIphoneXFrameVisibilityModal(){
  const existing = document.getElementById('iphonex-frame-visibility-modal');
  if(existing) existing.remove();
  const hidden = state.iphoneXHidden || [];

  // Tellinger for hver kategori
  const counts = {
    urgent: state.tasks.filter(t=>t.category==='urgent' && !t.done).length,
    today: state.tasks.filter(t=>t.todayFlag && t.category!=='urgent' && !t.done).length,
    a: state.tasks.filter(t=>t.category==='a' && !t.todayFlag && !t.done).length,
    b: state.tasks.filter(t=>t.category==='b' && !t.todayFlag && !t.done).length,
    c: state.tasks.filter(t=>t.category==='c' && !t.todayFlag && !t.done).length,
    pinned: state.tasks.filter(t=>t.pinned && !t.todayFlag && (t.category==='none' || !t.category) && !t.done).length,
    iphone: state.tasks.filter(t=>!t.pinned && !t.todayFlag && t.iphoneFlag && (t.category==='none' || !t.category) && !t.done).length
  };

  const frames = [
    {key:'urgent', label:'Haster', color:'#E24B4A', icon:ICONS.warning},
    {key:'today', label:'I dag', color:'#00B4DB', icon:ICONS.sun},
    {key:'a', label:'A', color:'#EF9F27', icon:`<span class="cat-letter-badge cat-a-badge">A</span>`},
    {key:'b', label:'B', color:'#639922', icon:`<span class="cat-letter-badge cat-b-badge">B</span>`},
    {key:'c', label:'C', color:'#7F77DD', icon:`<span class="cat-letter-badge cat-c-badge">C</span>`},
    {key:'pinned', label:'Pinnete', color:'#EF9F27', icon:ICONS.starFilled},
    {key:'iphone', label:'iPhone-merkede', color:'#378ADD', icon:ICONS.phone}
  ];

  const modal = document.createElement('div');
  modal.id = 'iphonex-frame-visibility-modal';
  modal.className = 'modal-overlay';
  modal.innerHTML = `<div class="modal-content" style="max-width:340px">
    <div class="modal-header">
      ${ICONS.filter}
      <span class="modal-title">Velg rammer å vise</span>
      <button class="modal-close" data-modal-close>${ICONS.x}</button>
    </div>
    <div style="display:flex;gap:6px;padding:8px 12px;border-bottom:0.5px solid var(--border-tertiary)">

      <button class="alle-group-ctrl-btn" data-vis-deselect-all style="flex:1;justify-content:center">Fjern alle</button>

    <div style="padding:6px 8px">
      ${frames.map(f=>{
        const isVisible = !hidden.includes(f.key);
        return `<label class="vis-row" data-vis-item="${f.key}" style="border-left:3px solid ${f.color}">
          <div class="vis-check ${isVisible?'checked':''}" style="${isVisible?`background:${f.color};border-color:${f.color}`:''}">${isVisible?ICONS.check:''}</div>
          ${f.icon}
          <span class="vis-name" style="${isVisible?'':'color:var(--text-tertiary)'}">${escapeHtml(f.label)}</span>
          <span class="vis-count">${counts[f.key]||0}</span>
        </label>`;
      }).join('')}
    </div>
    <div style="padding:8px 12px;border-top:0.5px solid var(--border-tertiary)">
      <button class="fab-btn primary" id="vis-done-ix" style="width:100%">Ferdig</button>
    </div>
  </div>`;
  document.body.appendChild(modal);

  const refreshCount = () => {
    const hiddenNow = state.iphoneXHidden || [];
    const visible = 7 - hiddenNow.length;
    const doneBtn = modal.querySelector('#vis-done-ix');
    if(doneBtn) doneBtn.textContent = `Ferdig (${visible} valgt)`;
  };
  refreshCount();

  modal.querySelectorAll('[data-vis-item]').forEach(row=>{
    row.addEventListener('click',(e)=>{

        list = list.filter(x=>x!==key);
      } else {

    e.stopPropagation();
