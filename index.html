input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}

const fmtDate = (iso) => {
  if(!iso) return 'Ingen dato';

  if(diff===-1) return 'I går';
  if(diff>1 && diff<7) return ['Søn','Man','Tir','Ons','Tor','Fre','Lør'][d.getDay()];
  return d.toLocaleDateString('nb-NO',{day:'2-digit',month:'short'});
};

const MAX_IMAGE_DIM = 1024;
const JPEG_QUALITY = 0.82;
function compressImage(file){
  return new Promise((resolve, reject)=>{
    if(!file || !file.type.startsWith('image/')){
      reject(new Error('Ikke et bilde'));
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > MAX_IMAGE_DIM || h > MAX_IMAGE_DIM){
          if(w > h){ h = Math.round(h * MAX_IMAGE_DIM / w); w = MAX_IMAGE_DIM; }
          else { w = Math.round(w * MAX_IMAGE_DIM / h); h = MAX_IMAGE_DIM; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', JPEG_QUALITY);
        resolve(dataUrl);
      };
      img.onerror = () => reject(new Error('Kunne ikke laste bilde'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Kunne ikke lese fil'));
    reader.readAsDataURL(file);
  });
}

}
function formatBytes(b){
  if(b < 1024) return b + ' B';
  if(b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(2) + ' MB';
}

function migrateState(s){
  if(s.groups && !s.groups1){
    s.groups1 = s.groups;
    s.groups2 = [];
    delete s.groups;
  }
  if(!s.groups1) s.groups1 = JSON.parse(JSON.stringify(DEFAULT_STATE.groups1));
  if(!s.groups2) s.groups2 = JSON.parse(JSON.stringify(DEFAULT_STATE.groups2));
  if(!Array.isArray(s.deletedTasks)) s.deletedTasks = [];
  if(s.tasks) s.tasks.forEach(t=>{
    if(t.groupId !== undefined && t.group1Id === undefined){
      t.group1Id = t.groupId;
      delete t.groupId;
    }
    if(t.group1Id === undefined) t.group1Id = null;
    if(t.group2Id === undefined) t.group2Id = null;
    if(t.futureDate === undefined) t.futureDate = null;
    if(t.www === undefined) t.www = '';
    if(t.contact === undefined) t.contact = '';
    if(typeof t.pinned !== 'boolean') t.pinned = false;
    if(typeof t.iphoneFlag !== 'boolean') t.iphoneFlag = false;
    if(typeof t.todayFlag !== 'boolean') t.todayFlag = false;
    if(!['none','urgent','a','b','c'].includes(t.category)) t.category = 'none';
    if(typeof t.order !== 'number') t.order = 0;
    if(!Array.isArray(t.images)) t.images = [];
  });
  if(s.todayGrouped !== undefined && s.todayView === undefined){
    s.todayView = s.todayGrouped ? 'group1' : 'list';
    delete s.todayGrouped;
  }
  if(s.todayFilter !== undefined){
    if(s.todayFilter && s.todayFilter !== 'all'){
      if(s.todayView === 'group2') s.group2Filter = [s.todayFilter];
      else s.group1Filter = [s.todayFilter];
    }
    delete s.todayFilter;
  }
  if(typeof s.columnsLayout !== 'boolean') s.columnsLayout = false;
  if(typeof s.dagensView !== 'string') s.dagensView = 'group1';
  if(typeof s.iphoneView !== 'string') s.iphoneView = 'list';
  // Migrer fra gammel boolean til tre-valg streng
  if(s.iphoneOnlyFlagged === true) s.iphoneListFilter = 'iphone';
  if(typeof s.iphoneOnlyFlagged === 'boolean') delete s.iphoneOnlyFlagged;
  if(!['all','pinned','iphone'].includes(s.iphoneListFilter)) s.iphoneListFilter = 'all';
  if(!['all','urgent','today','a','b','c','pinned','iphone'].includes(s.iphoneXFilter)) s.iphoneXFilter = 'all';
  if(!['prioritert','linje','group1','group2','urgent','today','a','b','c','pinned','iphone'].includes(s.alleFilter)) s.alleFilter = 'prioritert';
  if(!Array.isArray(s.alleGroup1Hidden)) s.alleGroup1Hidden = [];
  if(!Array.isArray(s.alleGroup2Hidden)) s.alleGroup2Hidden = [];
  if(!Array.isArray(s.iphoneXHidden)) s.iphoneXHidden = [];
  if(!['all','pinned','iphone'].includes(s.dagensListFilter)) s.dagensListFilter = 'pinned';
  if(!['all','pinned','iphone'].includes(s.todayListFilter)) s.todayListFilter = 'all';
  if(typeof s.hideEmptyGroups1 !== 'boolean') s.hideEmptyGroups1 = false;
  if(typeof s.hideEmptyGroups2 !== 'boolean') s.hideEmptyGroups2 = true;
  if(typeof s.compactGroup1 !== 'boolean') s.compactGroup1 = false;
  if(typeof s.compactGroup2 !== 'boolean') s.compactGroup2 = false;
  if(typeof s.showHiddenEmptyGroups !== 'boolean') s.showHiddenEmptyGroups = false;
  if(!s.columnWidths || typeof s.columnWidths !== 'object') s.columnWidths = {};
  // Migrere fra gammel global columnWidth
  if(typeof s.columnWidth === 'number') delete s.columnWidth;
  if(!s.collapsedGroups || typeof s.collapsedGroups !== 'object') s.collapsedGroups = {};
  if(!s.collapsedWeekDays || typeof s.collapsedWeekDays !== 'object') s.collapsedWeekDays = {};
  if(!s.collapsedSections || typeof s.collapsedSections !== 'object') s.collapsedSections = {};
  if(!Array.isArray(s.dividers)) s.dividers = [];
  if(!Array.isArray(s.dividersIphoneXPinned)) s.dividersIphoneXPinned = [];
  if(!Array.isArray(s.dividersIphoneXIphone)) s.dividersIphoneXIphone = [];
  if(!Array.isArray(s.dividersIphoneXUrgent)) s.dividersIphoneXUrgent = [];
  if(!Array.isArray(s.dividersIphoneXToday)) s.dividersIphoneXToday = [];
  if(!Array.isArray(s.dividersIphoneXA)) s.dividersIphoneXA = [];
  if(!Array.isArray(s.dividersIphoneXB)) s.dividersIphoneXB = [];
  if(!Array.isArray(s.dividersIphoneXC)) s.dividersIphoneXC = [];
  if(typeof s.nextTaskNumber !== 'number' || s.nextTaskNumber < 1000) s.nextTaskNumber = 1000;
  // Migrere order på grupper hvis mangler
  if(Array.isArray(s.groups1)){
    s.groups1.forEach((g, i)=>{ if(typeof g.order !== 'number') g.order = i; });
  }
  if(Array.isArray(s.groups2)){
    s.groups2.forEach((g, i)=>{ if(typeof g.order !== 'number') g.order = i; });
  }
  // Tildele numre til eksisterende oppgaver basert på id (som inneholder timestamp)
  if(s.tasks){
    const unnumbered = s.tasks.filter(t=>typeof t.number !== 'number');
    if(unnumbered.length){
      // Sorter etter id-tidsstempel (eldste først)
      unnumbered.sort((a,b)=>(a.id||'').localeCompare(b.id||''));
      unnumbered.forEach(t=>{
        t.number = s.nextTaskNumber;
        s.nextTaskNumber++;
      });
    }
  }
  if(!Array.isArray(s.group1Filter)) s.group1Filter = [];
  if(!Array.isArray(s.group2Filter)) s.group2Filter = [];
  if(s.searchQuery === undefined) s.searchQuery = '';
  return s;
}

function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

function hexToRgb(hex){
  hex = (hex||'').replace('#','');
  if(hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  if(hex.length !== 6) return '128,128,128';
  const num = parseInt(hex, 16);
  if(isNaN(num)) return '128,128,128';
  return [(num>>16)&255, (num>>8)&255, num&255].join(',');
}

function moveTaskInGroup(id, direction){
  const t = state.tasks.find(x=>x.id===id);
  if(!t) return;
  // Bestem hvilken gruppe-akse (1 eller 2) basert på gjeldende visning
  const view = state.view === 'dagens' ? state.dagensView : state.todayView;
  const groupKey = view === 'group2' ? 'group2Id' : 'group1Id';
  const myGroup = t[groupKey] || null;
  // Hent alle oppgaver i samme gruppe (uten ferdige)
  const siblings = state.tasks.filter(x=>!x.done && (x[groupKey]||null) === myGroup);
  // Sorter etter eksisterende order, så prioritet, så dato
  siblings.sort((a,b)=>{
    if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
    const pr = prioRank[a.priority]-prioRank[b.priority];
    if(pr !== 0) return pr;
    return (a.date||'9999').localeCompare(b.date||'9999');
  });
  const i = siblings.findIndex(x=>x.id===id);
  if(i < 0) return;
  const j = i + direction;
  if(j < 0 || j >= siblings.length) return;
  // Bytt order-verdier ved å renummerere alle
  [siblings[i], siblings[j]] = [siblings[j], siblings[i]];
  siblings.forEach((x, idx)=>{ x.order = (idx+1)*10; });
  save(); render();
}

function toggleGroupFilter(setNr, gid){
  const key = setNr===2 ? 'group2Filter' : 'group1Filter';
  const arr = state[key] || [];
  const i = arr.indexOf(gid);
  if(i>=0) arr.splice(i,1);
  else arr.push(gid);
  state[key] = arr;
  save(); render();
}

function matchesSearch(t){
  const q = (state.searchQuery||'').trim().toLowerCase();
  if(!q) return true;
  const inField = (s) => (s||'').toLowerCase().includes(q);
  if(inField(t.title)) return true;
  if(inField(t.notes)) return true;
  if(inField(t.www)) return true;
  if(inField(t.contact)) return true;
  // Søk på nummer (eksakt eller delvis)
  if(typeof t.number === 'number' && String(t.number).includes(q)) return true;
  if(t.subtasks && t.subtasks.some(s=>inField(s.text))) return true;
  return false;
}
function matchesSearchNote(n){
  const q = (state.searchQuery||'').trim().toLowerCase();
  if(!q) return true;
  return (n.title||'').toLowerCase().includes(q)
    || (n.description||'').toLowerCase().includes(q)
    || (n.body||'').toLowerCase().includes(q);
}
function highlightSearch(text){
  const q = (state.searchQuery||'').trim();
  if(!q) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return escaped.replace(re,'<mark>$1</mark>');
}
function normalizeUrl(url){
  if(!url) return '';
  const u = url.trim();
  if(!u) return '';
  if(/^https?:\/\//i.test(u)) return u;
  return 'https://'+u;
}
function hasContent(t){ return (t.notes && t.notes.trim()) || (t.subtasks && t.subtasks.length); }
function progress(t){
  if(!t.subtasks || !t.subtasks.length) return null;
  const done = t.subtasks.filter(s=>s.done).length;
  return {done, total:t.subtasks.length};
}

      <button class="toggle-btn ${listFilterValue==='all'?'active':''}" ${listFilterAttr}="all">Alt</button>
      <button class="toggle-btn ${listFilterValue==='pinned'?'active':''}" ${listFilterAttr}="pinned" style="${listFilterValue==='pinned'?'background:rgba(239,159,39,0.15);color:#FAC775;border-color:#EF9F27':''}">${ICONS.star} Pinnet</button>
      <button class="toggle-btn ${listFilterValue==='iphone'?'active':''}" ${listFilterAttr}="iphone" style="${listFilterValue==='iphone'?'background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)':''}">${ICONS.phone} iPhone</button>` : '';
    fb.innerHTML = `<div class="view-toggle">
      <span class="view-toggle-label">Vis:</span>
      <button class="toggle-btn ${tv==='list'?'active':''}" data-view-mode="list">Liste</button>
      <button class="toggle-btn ${tv==='group1'?'active':''}" data-view-mode="group1">Gruppe 1</button>
      <button class="toggle-btn ${tv==='group2'?'active':''}" data-view-mode="group2">Gruppe 2</button>
      <button class="toggle-btn ${tv==='priority'?'active':''}" data-view-mode="priority">Prioritet</button>
      ${showColumnsToggle ? `<button class="toggle-btn ${state.columnsLayout?'active':''}" data-toggle-columns="1" title="Kolonner side om side" style="${state.columnsLayout?'background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)':''}">${ICONS.columns} Kolonner</button>` : ''}
      ${isInGroupView ? `<span class="toggle-divider"></span>
      <button class="toggle-btn ${!isCompact?'active':''}" data-set-compact="0" title="Detaljert visning">${ICONS.listDetails} Detaljert</button>
      <button class="toggle-btn ${isCompact?'active':''}" data-set-compact="1" title="Kun tittel" style="${isCompact?'background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)':''}">${ICONS.listCompact} Kun tittel</button>` : ''}
      ${filterToggleHTML}
    </div>
    ${groupChipsHTML}
    ${filterStatusHTML}`;
    fb.querySelectorAll('[data-view-mode]').forEach(b=>b.addEventListener('click',()=>{
      if(isDagens) state.dagensView=b.dataset.viewMode;
      else state.todayView=b.dataset.viewMode;
      state.showHiddenEmptyGroups = false;
      save(); render();
    }));
    fb.querySelectorAll('[data-dagens-filter]').forEach(b=>b.addEventListener('click',()=>{
      state.dagensListFilter = b.dataset.dagensFilter;
      save(); render();
    }));
    fb.querySelectorAll('[data-today-filter]').forEach(b=>b.addEventListener('click',()=>{
      state.todayListFilter = b.dataset.todayFilter;
      save(); render();
    }));
    fb.querySelectorAll('[data-toggle-columns]').forEach(b=>b.addEventListener('click',()=>{
      state.columnsLayout = !state.columnsLayout;
      save(); render();
    }));
    fb.querySelectorAll('[data-set-compact]').forEach(b=>b.addEventListener('click',()=>{
      state[compactKey] = b.dataset.setCompact === '1';
      save(); render();
    }));
    fb.querySelectorAll('[data-open-filter]').forEach(b=>b.addEventListener('click',()=>{
      openFilterDropdown(parseInt(b.dataset.openFilter), b);
    }));
    fb.querySelectorAll('[data-reset-all-filters]').forEach(b=>b.addEventListener('click',()=>{
      clearAllGroupFilters();
    }));
    fb.querySelectorAll('[data-toggle-hidden-empty]').forEach(b=>b.addEventListener('click',()=>{
      state.showHiddenEmptyGroups = !state.showHiddenEmptyGroups;
      save(); render();
    }));
    fb.querySelectorAll('[data-toggle-all-groups]').forEach(b=>b.addEventListener('click',()=>{
      const setNr = parseInt(b.dataset.toggleAllGroups);
      const groupSet = setNr === 2 ? state.groups2 : state.groups1;
      if(!state.collapsedGroups) state.collapsedGroups = {};
      // Tell hvor mange som er kollapset – hvis alle, åpne alle. Ellers lukk alle.
      const prefix = setNr + '|';
      const collapsed = Object.keys(state.collapsedGroups).filter(k=>k.startsWith(prefix) && state.collapsedGroups[k]).length;
      const allCollapsed = collapsed >= groupSet.length && groupSet.length > 0;
      if(allCollapsed){
        // Åpne alle: fjern alle for dette settet
        Object.keys(state.collapsedGroups).forEach(k=>{
          if(k.startsWith(prefix)) delete state.collapsedGroups[k];
        });
      } else {
        // Lukk alle
        groupSet.forEach(g=>{ state.collapsedGroups[setNr + '|' + g.id] = true; });
      }
      save(); render();
    }));
    const ag = fb.querySelector('[data-add-group]'); if(ag) ag.addEventListener('click',()=>openGroupModal(parseInt(ag.dataset.addGroup)));
  } else if(state.view==='iphone'){
    const iv = state.iphoneView || 'list';
    // Hvis Gruppe 2-modus, vis også filter-rad
    let groupChipsHTML = '';
    if(iv === 'group2'){
      const groupSet = state.groups2;
      const filterArr = state.group2Filter;
      const hasFilter = filterArr && filterArr.length > 0;
      const totalGroups = groupSet.length;
      const activeCount = filterArr.length;
      const filterLabel = !hasFilter
        ? `Alle grupper (${totalGroups})`
        : (activeCount === 1
            ? (function(){const g=groupSet.find(x=>x.id===filterArr[0]); return g?g.name:'1 valgt';})()
            : `${activeCount} av ${totalGroups} valgt`);
      const filterBtnStyle = hasFilter
        ? 'background:var(--bg-info);color:var(--text-info);border-color:var(--border-info);font-weight:600'
        : '';
      const resetBtn = hasFilter
        ? `<button class="chip reset-filter-chip" data-reset-all-filters="1">${ICONS.x} Nullstill</button>`
        : '';
      const today = todayISO();
      const counts = {};
      state.tasks.forEach(t=>{
        if((t.date===today || t.iphoneFlag) && !t.done && matchesSearch(t)){
          const k = t.group2Id || '__none__';
          counts[k] = (counts[k]||0) + 1;
        }
      });
      let emptyCount = 0;
      if(state.hideEmptyGroups2 && !hasFilter){
        groupSet.forEach(g=>{ if(!(counts[g.id]>0)) emptyCount++; });
      }
      const hiddenEmptyBtn = (emptyCount > 0 && !state.showHiddenEmptyGroups)
        ? `<button class="filter-hidden-empty-btn" data-toggle-hidden-empty="1">${ICONS.eye} Skjult: ${emptyCount}</button>`
        : (state.showHiddenEmptyGroups && state.hideEmptyGroups2)
        ? `<button class="filter-hidden-empty-btn active" data-toggle-hidden-empty="1" style="background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)">${ICONS.eye} Viser alle</button>`
        : '';
      const cgKeys = Object.keys(state.collapsedGroups||{});
      const collapsedInView = cgKeys.filter(k=>k.startsWith('2|') && state.collapsedGroups[k]).length;
      const allCollapsed = collapsedInView >= groupSet.length && groupSet.length > 0;
      const toggleAllBtn = `<button class="filter-hidden-empty-btn" data-toggle-all-groups="2">${allCollapsed?ICONS.chevronDown:ICONS.chevronUp} ${allCollapsed?'Åpne alle':'Lukk alle'}</button>`;
      groupChipsHTML = `<div class="filter-row">
        <button class="filter-dropdown-btn" data-open-filter="2" style="${filterBtnStyle}">
          ${ICONS.filter}
          <span class="filter-dropdown-label">${escapeHtml(filterLabel)}</span>
          ${ICONS.chevron}
        </button>
        <button class="filter-add-group-btn" data-add-group="2" aria-label="Ny gruppe">${ICONS.plus}</button>
        ${hiddenEmptyBtn}
        ${toggleAllBtn}
        ${resetBtn}
      </div>`;
    }
    const lf = state.iphoneListFilter || 'all';
    // Tre-valg toggle vises kun i Liste-modus
    const filterToggle = iv === 'list' ? `<span class="toggle-divider"></span>
      <button class="toggle-btn ${lf==='all'?'active':''}" data-list-filter="all">Alt</button>
      <button class="toggle-btn ${lf==='pinned'?'active':''}" data-list-filter="pinned" style="${lf==='pinned'?'background:rgba(239,159,39,0.15);color:#FAC775;border-color:#EF9F27':''}">${ICONS.star} Pinnet</button>
      <button class="toggle-btn ${lf==='iphone'?'active':''}" data-list-filter="iphone" style="${lf==='iphone'?'background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)':''}">${ICONS.phone} iPhone</button>` : '';
    fb.innerHTML = `<div class="view-toggle">
      <span class="view-toggle-label">Vis:</span>
      <button class="toggle-btn ${iv==='list'?'active':''}" data-iphone-view="list">Liste</button>
      <button class="toggle-btn ${iv==='group2'?'active':''}" data-iphone-view="group2">Gruppe 2</button>
      ${filterToggle}
    </div>
    ${groupChipsHTML}`;
    fb.querySelectorAll('[data-iphone-view]').forEach(b=>b.addEventListener('click',()=>{
      state.iphoneView = b.dataset.iphoneView;
      state.showHiddenEmptyGroups = false;
      save(); render();
    }));
    fb.querySelectorAll('[data-list-filter]').forEach(b=>b.addEventListener('click',()=>{
      state.iphoneListFilter = b.dataset.listFilter;
      save(); render();
    }));
    fb.querySelectorAll('[data-open-filter]').forEach(b=>b.addEventListener('click',()=>{
      openFilterDropdown(parseInt(b.dataset.openFilter), b);
    }));
    fb.querySelectorAll('[data-reset-all-filters]').forEach(b=>b.addEventListener('click',()=>{
      clearAllGroupFilters();
    }));
    fb.querySelectorAll('[data-toggle-hidden-empty]').forEach(b=>b.addEventListener('click',()=>{
      state.showHiddenEmptyGroups = !state.showHiddenEmptyGroups;
      save(); render();
    }));
    fb.querySelectorAll('[data-toggle-all-groups]').forEach(b=>b.addEventListener('click',()=>{
      const setNr = parseInt(b.dataset.toggleAllGroups);
      const groupSet = setNr === 2 ? state.groups2 : state.groups1;
      if(!state.collapsedGroups) state.collapsedGroups = {};
      const prefix = setNr + '|';
      const collapsed = Object.keys(state.collapsedGroups).filter(k=>k.startsWith(prefix) && state.collapsedGroups[k]).length;
      const allCollapsed = collapsed >= groupSet.length && groupSet.length > 0;
      if(allCollapsed){
        Object.keys(state.collapsedGroups).forEach(k=>{
          if(k.startsWith(prefix)) delete state.collapsedGroups[k];
        });
      } else {
        groupSet.forEach(g=>{ state.collapsedGroups[setNr + '|' + g.id] = true; });
      }
      save(); render();
    }));
    const ag2 = fb.querySelector('[data-add-group]'); if(ag2) ag2.addEventListener('click',()=>openGroupModal(parseInt(ag2.dataset.addGroup)));
  } else if(state.view==='week'){
    fb.innerHTML = filterStatusHTML;
  } else if(state.view==='all'){
    const af = state.alleFilter || 'prioritert';
    fb.innerHTML = `<div class="view-toggle">
      <span class="view-toggle-label">Vis:</span>
      <button class="toggle-btn ${af==='prioritert'?'active':''}" data-alle-filter="prioritert">Alle prioriterte</button>
      <button class="toggle-btn ${af==='linje'?'active':''}" data-alle-filter="linje">Alle (linje)</button>
      <button class="toggle-btn ${af==='group1'?'active':''}" data-alle-filter="group1" style="${af==='group1'?'background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)':''}">Gruppe 1</button>
      <button class="toggle-btn ${af==='group2'?'active':''}" data-alle-filter="group2" style="${af==='group2'?'background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)':''}">Gruppe 2</button>
      <span class="toggle-divider"></span>
      <button class="toggle-btn ${af==='urgent'?'active':''}" data-alle-filter="urgent" style="${af==='urgent'?'background:rgba(226,75,74,0.18);color:#FF8080;border-color:#E24B4A':''}">${ICONS.warning} Haster</button>
      <button class="toggle-btn ${af==='today'?'active':''}" data-alle-filter="today" style="${af==='today'?'background:rgba(0,180,219,0.18);color:#5DDFF1;border-color:#00B4DB':''}">${ICONS.sun} I dag</button>
      <button class="toggle-btn ${af==='a'?'active':''}" data-alle-filter="a" style="${af==='a'?'background:rgba(239,159,39,0.18);color:#FAC775;border-color:#EF9F27':''}">A</button>
      <button class="toggle-btn ${af==='b'?'active':''}" data-alle-filter="b" style="${af==='b'?'background:rgba(99,153,34,0.18);color:#AED183;border-color:#639922':''}">B</button>
      <button class="toggle-btn ${af==='c'?'active':''}" data-alle-filter="c" style="${af==='c'?'background:rgba(127,119,221,0.18);color:#B5AEF0;border-color:#7F77DD':''}">C</button>
      <button class="toggle-btn ${af==='pinned'?'active':''}" data-alle-filter="pinned" style="${af==='pinned'?'background:rgba(239,159,39,0.18);color:#FAC775;border-color:#EF9F27':''}">${ICONS.star} Pinnet</button>
      <button class="toggle-btn ${af==='iphone'?'active':''}" data-alle-filter="iphone" style="${af==='iphone'?'background:var(--bg-info);color:var(--text-info);border-color:var(--border-info)':''}">${ICONS.phone} iPhone</button>
    </div>
    ${filterStatusHTML}`;
    fb.querySelectorAll('[data-alle-filter]').forEach(b=>b.addEventListener('click',()=>{
      state.alleFilter = b.dataset.alleFilter;
      save(); render();
    }));
  } else {
    fb.innerHTML='';
  }
  const fc = document.getElementById('filter-clear');
  if(fc) fc.addEventListener('click', clearAllGroupFilters);

  const c = document.getElementById('content');
  if(state.view==='today') c.innerHTML = renderToday();
  else if(state.view==='dagens') c.innerHTML = renderDagens();
  else if(state.view==='iphone') c.innerHTML = renderIphone();
  else if(state.view==='iphonex') c.innerHTML = renderIphoneX();
  else if(state.view==='week') c.innerHTML = renderWeek();
  else if(state.view==='all') c.innerHTML = renderAll();
  else if(state.view==='done') c.innerHTML = renderDone();
  else if(state.view==='deleted') c.innerHTML = renderDeleted();
  else if(state.view==='notes') c.innerHTML = renderNotes();
  else if(state.view==='noteForm') c.innerHTML = renderNoteForm();
  else c.innerHTML = renderForm();

  renderFab();

  if(state.view==='today' || state.view==='dagens' || state.view==='iphone' || state.view==='iphonex' || state.view==='week' || state.view==='all') wireTasks();
  if(state.view==='iphone') wireIphone();
  if(state.view==='done') { wireTasks(); wireDoneActions(); }
  if(state.view==='deleted') wireDeletedActions();
  if(state.view==='form') wireForm();
  if(state.view==='notes') wireNotes();
  if(state.view==='noteForm') wireNoteForm();
  wireDropZones();
}

function renderFab(){
  const fb = document.getElementById('fab-row');
  if(state.view==='notes' || state.view==='noteForm'){
    fb.innerHTML = `
      <button class="fab-btn" id="btn-settings">${ICONS.settings}</button>
      <button class="fab-btn" id="btn-export">${ICONS.download} Eksport</button>
      <button class="fab-btn primary" id="btn-new-note">${ICONS.plus} Nytt notat</button>`;
    document.getElementById('btn-new-note').addEventListener('click',()=>{
      state.noteForm={title:'',description:'',body:'',date:todayISO(),editingId:null};
      state.view='noteForm'; save(); render();
    });
  } else {
    fb.innerHTML = `
      <button class="fab-btn" id="btn-settings">${ICONS.settings}</button>
      <button class="fab-btn" id="btn-export">${ICONS.download} Eksport</button>
      <button class="fab-btn primary" id="btn-new-quick">${ICONS.plus} Ny</button>`;
    document.getElementById('btn-new-quick').addEventListener('click',()=>{
      state.returnView = state.view;
      state.view='form';
      state.form={title:'',notes:'',subtasks:[],priority:'med',date:todayISO(),futureDate:'',group1Id:'',group2Id:'',www:'',contact:'',images:[],pinned:false,iphoneFlag:false,todayFlag:false,category:'none',activeTab:'title',editingId:null,mode:'notes'};
      save(); render();
    });
  }
  document.getElementById('btn-export').addEventListener('click',openExportModal);
  document.getElementById('btn-settings').addEventListener('click',openSettingsModal);
}

function taskHTML(t, opts={}){
  const g1 = getGroup1(t.group1Id);
  const g2 = getGroup2(t.group2Id);
  const readOnly = opts.doneView || opts.readOnly;
  const makeChip = (g, setNr, hide) => {
    if(hide) return '';
    if(g){
      if(readOnly){
        return `<span style="display:inline-flex;align-items:center;gap:3px"><span class="group-dot" style="background:${g.color}"></span>${escapeHtml(g.name)}</span>`;
      }
      return `<span class="group-chip-clickable" data-group-pick="${t.id}|${setNr}" style="background:${g.color}1a;color:${g.color};border-color:${g.color}"><span class="group-dot" style="background:${g.color};border-radius:50%;width:7px;height:7px"></span>${escapeHtml(g.name)}<span class="group-chip-caret">▾</span></span>`;
    }
    if(readOnly) return '';
    return `<button class="group-chip-add" data-group-pick="${t.id}|${setNr}">+ Gruppe ${setNr}</button>`;
  };
  const group1Tag = makeChip(g1, 1, opts.hideGroup1);
  const group2Tag = makeChip(g2, 2, opts.hideGroup2);
  const prioNum = t.priority==='high'?'1':t.priority==='med'?'2':'3';
  const prioTag = `<span style="color:${t.priority==='high'?'#A32D2D':t.priority==='med'?'#854F0B':'#0F6E56'};font-weight:600">${prioNum}·${prioLabel[t.priority]}</span>`;
  const dateTag = opts.hideDate ? '' : `<span>${fmtDate(t.date)}</span>`;
  const futureTag = t.futureDate ? `<span class="future-badge">${ICONS.calendarEvent} Oppf. ${fmtDate(t.futureDate)}</span>` : '';
  const prog = progress(t);
  const progTag = prog ? `<span class="checklist-progress">${ICONS.checkbox} ${prog.done}/${prog.total}</span>` : '';
  const contactTag = (t.contact && t.contact.trim()) ? `<span class="contact-chip">${ICONS.user}${escapeHtml(t.contact)}</span>` : '';
  const imageCount = (t.images && t.images.length) ? t.images.length : 0;
  const imageTag = imageCount ? `<span class="image-count-badge" data-show-images="${t.id}" style="cursor:pointer">${ICONS.photo}${imageCount} ${imageCount===1?'bilde':'bilder'}</span>` : '';
  const subParts = [prioTag, dateTag, group1Tag, group2Tag, progTag, futureTag, contactTag, imageTag].filter(Boolean).join('<span style="color:var(--border-secondary)">·</span>');
  const isExpanded = state.expanded.has(t.id);
  const expandable = hasContent(t);
  const chevron = expandable ? `<span class="task-chevron">${ICONS.chevron}</span>` : '';
  const wwwUrl = normalizeUrl(t.www);
  const wwwTag = wwwUrl ? `<a class="task-www" href="${escapeAttr(wwwUrl)}" target="_blank" rel="noopener" data-www-link="1">${ICONS.external} ${escapeHtml(t.www)}</a>` : '';

  let preview = '';
  if(expandable && !isExpanded){
    if(t.notes && t.notes.trim()) preview = `<p class="note-preview">${highlightSearch(t.notes)}</p>`;
    else if(t.subtasks && t.subtasks.length){
      const next = t.subtasks.find(s=>!s.done) || t.subtasks[0];
      preview = `<p class="note-preview">${highlightSearch(next.text)}</p>`;
    }
  }

  let expanded = '';
  if(expandable && isExpanded){
    const notesHTML = (t.notes && t.notes.trim()) ? `<p class="note-text">${highlightSearch(t.notes)}</p>` : '';
    const subsHTML = (t.subtasks && t.subtasks.length) ? `<div class="subtask-list">${
      t.subtasks.map(s=>`<div class="subtask ${s.done?'done':''}" data-toggle-sub="${t.id}|${s.id}">
        <div class="subtask-box ${s.done?'checked':''}">${s.done?ICONS.check:''}</div>
        <span class="subtask-text">${highlightSearch(s.text)}</span>
      </div>`).join('')
    }</div>` : '';
    expanded = `<div class="expanded-content">${notesHTML}${subsHTML}</div>`;
  }

  const draggable = opts.draggable===false ? '' : 'draggable="true"';
  const pinBtn = opts.doneView ? '' : `<button class="icon-btn ${t.pinned?'pinned':''}" data-pin="${t.id}" aria-label="${t.pinned?'Fjern fra dagens':'Pin til dagens'}">${t.pinned?ICONS.starFilled:ICONS.star}</button>`;
  const iphoneBtn = opts.doneView ? '' : `<button class="icon-btn ${t.iphoneFlag?'iphone-active':''}" data-toggle-iphone="${t.id}" aria-label="${t.iphoneFlag?'Fjern fra iPhone':'Legg til iPhone'}">${ICONS.phone}</button>`;
  const todayBtn = opts.doneView ? '' : `<button class="icon-btn ${t.todayFlag?'today-active':''}" data-toggle-today="${t.id}" aria-label="${t.todayFlag?'Fjern I dag-merket':'Merk for I dag'}">${ICONS.sun}</button>`;
  const gripHandle = opts.showMove ? `<button class="task-grip" data-grip="${t.id}" aria-label="Dra for å flytte">${ICONS.grip}</button>` : '';
  const actions = opts.doneView
    ? `<div class="task-actions">
         <button class="icon-btn" data-restore="${t.id}" aria-label="Gjenopprett">${ICONS.restore}</button>
         <button class="icon-btn" data-del="${t.id}" aria-label="Slett">${ICONS.trash}</button>
       </div>`
    : `<div class="task-actions">
         ${todayBtn}
         ${pinBtn}
         ${iphoneBtn}
         <button class="icon-btn" data-copy="${t.id}" aria-label="Kopier">${ICONS.copy}</button>
         <button class="icon-btn" data-edit="${t.id}" aria-label="Rediger">${ICONS.edit}</button>
         <button class="icon-btn" data-del="${t.id}" aria-label="Slett">${ICONS.trash}</button>
       </div>`;

  const taskNumber = (typeof t.number === 'number') ? `<span class="task-number">${t.number}</span>` : '';
  const imgCount = (t.images||[]).length;
  const compactImageTag = imgCount > 0 ? `<span class="task-compact-image" data-show-images="${t.id}">${ICONS.photo}<span style="font-weight:600">${imgCount}</span></span>` : '';
  const contactTagAbove = (t.contact||'').trim() ? `<div class="task-contact-tag">${ICONS.user}<span>${escapeHtml(t.contact)}</span></div>` : '';

  if(opts.compact){
    return `<div class="task task-compact prio-${t.priority} ${t.done?'done':''} ${isExpanded?'expanded':''}" ${draggable} data-id="${t.id}">
      ${gripHandle}
      <div class="checkbox ${t.done?'checked':''}" data-check="${t.id}">${t.done?ICONS.check:''}</div>
      <div class="task-body" data-toggle-note="${t.id}">
        ${contactTagAbove}
        <p class="task-title">${highlightSearch(t.title)}</p>
        ${isExpanded ? `<p class="task-sub">${subParts}</p>${preview}${wwwTag}${expanded}` : ''}
      </div>
      ${compactImageTag}
      ${taskNumber}
      ${actions}
    </div>`;
  }

  return `<div class="task prio-${t.priority} ${t.done?'done':''} ${isExpanded?'expanded':''}" ${draggable} data-id="${t.id}">
    ${gripHandle}
    <div class="checkbox ${t.done?'checked':''}" data-check="${t.id}">${t.done?ICONS.check:''}</div>
    <div class="task-body" data-toggle-note="${t.id}">
      ${contactTagAbove}
      <div class="task-title-row">
        <p class="task-title">${highlightSearch(t.title)}</p>
        ${taskNumber}
        ${chevron}
      </div>
      <p class="task-sub">${subParts}</p>
      ${preview}
      ${wwwTag}
      ${expanded}
    </div>
    ${actions}
  </div>`;
}

function renderColoredGroupBlock(color, dotLabel, count, body, darkText){
  return `<div class="colored-group-block" style="border-color:${color}">
    <div class="colored-group-header" style="background:${color}1a;border-bottom-color:${color}">
      <span class="colored-group-name" style="color:${darkText}">${dotLabel}</span>
      <span class="colored-group-count" style="color:${darkText}">${count}</span>
    </div>
    <div class="colored-group-body">${body}</div>
  </div>`;
}

function darkenColor(hex){
  return hex;
}

function renderToday(){
  const tv = state.todayView || 'group1';
  const todayListFilter = state.todayListFilter || 'all';
  const today = todayISO();

  // I Liste-modus: bruk tre-valg filter. I andre moduser: alle dagens-oppgaver.
  let list;
  if(tv === 'list'){
    if(todayListFilter === 'pinned'){
      list = state.tasks.filter(t=>t.pinned && !t.done && matchesSearch(t) && passesGroupFilter(t));
    } else if(todayListFilter === 'iphone'){
      list = state.tasks.filter(t=>t.iphoneFlag && !t.done && matchesSearch(t) && passesGroupFilter(t));
    } else { // 'all'
      list = state.tasks.filter(t=>(t.date===today || t.pinned || t.iphoneFlag) && !t.done && matchesSearch(t) && passesGroupFilter(t));
    }
  } else {
    list = state.tasks.filter(t=>t.date===today && !t.done && matchesSearch(t) && passesGroupFilter(t));
  }

  // For list og priority – tom skjerm når ingenting matcher
  if(!list.length && (tv === 'list' || tv === 'priority')){
    if(isGroupFilterActive() || (state.searchQuery||'').trim()){
      return `<div class="empty">${ICONS.checks}<p>Ingen oppgaver matcher filteret</p>${isGroupFilterActive()?`<p style="font-size:11px;margin-top:6px"><button class="filter-clear-btn" id="filter-clear-empty" style="color:var(--text-info)">${ICONS.x} Vis alle</button></p>`:''}</div>`;
    }
    if(tv === 'list' && todayListFilter === 'pinned'){
      return `<div class="empty">${ICONS.star}<p>Ingen pinnete oppgaver enda</p></div>`;
    }
    if(tv === 'list' && todayListFilter === 'iphone'){
      return `<div class="empty">${ICONS.phone}<p>Ingen iPhone-merkede oppgaver enda</p></div>`;
    }
    return `<div class="empty">${ICONS.checks}<p>Ingen oppgaver i dag</p></div>`;
  }

  if(tv === 'list'){
    const sortFn = (a,b)=>{
      if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
      return prioRank[a.priority]-prioRank[b.priority];
    };

    if(todayListFilter === 'pinned' || todayListFilter === 'iphone'){
      // Kompakt modus med skille-linjer
      list.sort(sortFn);
      const wovenHTML = weaveDividers(list, t=>taskHTML(t,{hideDate:true, draggable:true, compact:true, showMove:true}));
      return wovenHTML + `<button class="add-divider-btn" data-add-divider="1">${ICONS.minus} Sett inn skille-linje</button>`;
    }

    // Alt-modus: tre seksjoner med rammer
    // Alternativ A: pinnet og iPhone-merket → havner i Pinnete
    const pinnedList = list.filter(t=>t.pinned).sort(sortFn);
    const iphoneList = list.filter(t=>!t.pinned && t.iphoneFlag).sort(sortFn);
    const restList = list.filter(t=>!t.pinned && !t.iphoneFlag).sort(sortFn);

    let html = '';

    if(pinnedList.length){
      const tasksHTML = pinnedList.map(t=>taskHTML(t, {hideDate:true, draggable:true, compact:true, showMove:true})).join('');
      html += renderSection('pinned', 'pinned-section', ICONS.starFilled, 'Pinnete', pinnedList.length, tasksHTML);
    }

    if(iphoneList.length){
      const tasksHTML = iphoneList.map(t=>taskHTML(t, {hideDate:true, draggable:true, compact:true, showMove:true})).join('');
      html += renderSection('iphone', 'iphone-section', ICONS.phone, 'iPhone-merkede', iphoneList.length, tasksHTML);
    }

    // Resten-ramme med skille-linjer inni
    if(restList.length || (state.dividers||[]).length){
      const wovenHTML = weaveDividers(restList, t=>taskHTML(t, {hideDate:true, draggable:true, compact:true, showMove:true}));
      html += renderSection('rest', 'rest-section', ICONS.listCompact, 'Resten', restList.length, wovenHTML);
    }

    html += `<button class="add-divider-btn" data-add-divider="1">${ICONS.minus} Sett inn skille-linje</button>`;
    return html;
  }

  if(tv === 'priority'){
    const groups = [['high','Høy',1,'#E24B4A','#791F1F'],['med','Medium',2,'#EF9F27','#633806'],['low','Lav',3,'#5DCAA5','#085041']];
    return groups.map(([p,label,num,color,darkText])=>{
      const items = list.filter(t=>t.priority===p);
      if(!items.length) return '';
      const header = `<span class="colored-group-name" style="color:${darkText}"><span style="width:20px;height:20px;border-radius:50%;background:${color};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${num}</span>${label}</span>`;
      const body = `<div class="drop-zone" data-drop-prio="${p}" data-drop-date="${todayISO()}"></div>${items.map(t=>taskHTML(t,{hideDate:true})).join('')}<div class="drop-zone" data-drop-prio="${p}" data-drop-date="${todayISO()}"></div>`;
      return `<div class="colored-group-block" style="border-color:${color}">
        <div class="colored-group-header" style="background:${color}1a;border-bottom-color:${color}">
          ${header}
          <span class="colored-group-count" style="color:${darkText}">${items.length}</span>
        </div>
        <div class="colored-group-body">${body}</div>
      </div>`;
    }).join('');
  }

  return renderGroupView(tv, list, true);
}

function renderGroupView(tv, list, hideDate, opts){
  opts = opts || {};
  const isDagens = !!opts.dagens;
  const isG1 = tv === 'group1';
  const setNr = isG1 ? 1 : 2;
  const groupSet = isG1 ? state.groups1 : state.groups2;
  const getterFn = isG1 ? 'group1Id' : 'group2Id';
  const dropAttr = isG1 ? 'data-drop-group1' : 'data-drop-group2';
  const filterArr = isG1 ? state.group1Filter : state.group2Filter;
  const hasFilter = filterArr && filterArr.length > 0;
  const NONE_KEY = '__none__';

  const buckets = {};
  list.forEach(t=>{ const k=t[getterFn]||NONE_KEY; (buckets[k]=buckets[k]||[]).push(t); });

  // Tell oppgaver per gruppe på tvers av hele state
  const unfilteredCounts = {};
  state.tasks.forEach(t=>{
    if(t.done) return;
    if(isDagens){
      if(!t.pinned) return;
    } else {
      if(t.date !== todayISO()) return;
    }
    if(!matchesSearch(t)) return;
    const k = t[getterFn] || NONE_KEY;
    unfilteredCounts[k] = (unfilteredCounts[k]||0) + 1;
  });

  // Synlige grupper: med filter = de i filterArr. Uten filter = alle navngitte + _none hvis den har oppgaver.
  // Sortert etter gruppens 'order'-felt (definert i settings).
  const sortedGroupSet = [...groupSet].sort((a,b)=>(a.order||0)-(b.order||0));
  let visibleGroupIds;
  if(hasFilter){
    // Behold sortert rekkefølge selv med filter
    visibleGroupIds = sortedGroupSet.filter(g=>filterArr.includes(g.id)).map(g=>g.id);
    if(filterArr.includes('_none') || filterArr.includes(NONE_KEY)){
      visibleGroupIds.push(NONE_KEY);
    }
  } else {
    visibleGroupIds = sortedGroupSet.map(g=>g.id);
    if(unfilteredCounts[NONE_KEY] > 0) visibleGroupIds.push(NONE_KEY);
  }

  // Skjul tomme grupper hvis innstillingen er på (og brukeren ikke har valgt å vise dem)
  const hideEmpty = isG1 ? state.hideEmptyGroups1 : state.hideEmptyGroups2;
  let hiddenEmptyCount = 0;
  if(hideEmpty && !hasFilter && !state.showHiddenEmptyGroups){
    const before = visibleGroupIds.length;
    visibleGroupIds = visibleGroupIds.filter(k=>(unfilteredCounts[k]||0) > 0);
    hiddenEmptyCount = before - visibleGroupIds.length;
  }
  // Eksponer på state midlertidig så fab-row kan vise antallet
  state._lastHiddenEmptyCount = hiddenEmptyCount;

  // Bruk compact-modus
  const useCompact = opts.forceCompact ? true : (isG1 ? state.compactGroup1 : state.compactGroup2);

  // Skjulte grupper: med filter aktivt, alle med oppgaver som ikke er valgt
  const hiddenGroups = hasFilter ? [
    ...groupSet.filter(g => !filterArr.includes(g.id) && unfilteredCounts[g.id] > 0).map(g=>({id:g.id, name:g.name, color:g.color})),
    ...(unfilteredCounts[NONE_KEY] > 0 && !filterArr.includes(NONE_KEY) ? [{id:NONE_KEY, name:'Uten gruppe', color:'#888780'}] : [])
  ] : [];

  const sortItems = (items) => items.sort((a,b)=>{
    if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
    const pr = prioRank[a.priority]-prioRank[b.priority];
    if(pr !== 0) return pr;
    return (a.date||'9999').localeCompare(b.date||'9999');
  });

  const getColWidth = (k) => {
    const w = state.columnWidths && state.columnWidths[k];
    return (typeof w === 'number' && w >= 120 && w <= 500) ? w : 180;
  };

  const visibleBlocks = visibleGroupIds.map(k=>{
    const g = k===NONE_KEY ? null : (isG1 ? getGroup1(k) : getGroup2(k));
    if(k !== NONE_KEY && !g) return null;
    const color = g ? g.color : '#888780';
    const items = sortItems(buckets[k] || []);
    const label = g ? `<span class="colored-group-dot" style="background:${color}"></span>${escapeHtml(g.name)}` : `<span class="colored-group-dot" style="background:#888780"></span>Uten gruppe`;
    const dropVal = k===NONE_KEY ? '' : k;
    const filterKey = k===NONE_KEY ? '_none' : k;
    const isActive = hasFilter && filterArr.includes(filterKey);
    const headerBg = isActive ? color : `${color}1a`;
    const checkmark = isActive ? `<span style="display:inline-flex;align-items:center;color:#fff;margin-right:2px">${ICONS.check}</span>` : '';
    const filterTag = `data-filter-group="${setNr}|${filterKey}"`;
    const editBtn = g ? `<button class="icon-btn group-edit-btn" data-edit-group="${setNr}|${g.id}" aria-label="Endre gruppe" style="color:${isActive?'#fff':color};opacity:0.7" onclick="event.stopPropagation()">${ICONS.edit}</button>` : '';
    const emptyHint = items.length === 0 ? `<div style="padding:10px 14px;font-size:11px;color:var(--text-tertiary);font-style:italic">${isDagens?'Ingen pinnete oppgaver i denne gruppen':'Ingen oppgaver i denne gruppen i dag'}</div>` : '';
    const dropZones = isDagens ? '' : `<div class="drop-zone" ${dropAttr}="${dropVal}" ${hideDate?`data-drop-date="${todayISO()}"`:''}></div>`;
    // I kolonne-modus settes individuell bredde via inline style
    const widthStyle = state.columnsLayout ? `;width:${getColWidth(k)}px` : '';
    // Sammenfoldet?
    const collapseKey = `${setNr}|${k}`;
    const isCollapsed = !!(state.collapsedGroups && state.collapsedGroups[collapseKey]);
    // Dra-håndtak (kun for navngitte grupper, ikke NONE)
    const groupGrip = g ? `<span class="group-drag-handle" data-group-grip="${setNr}|${g.id}" aria-label="Dra for å flytte gruppe">${ICONS.grip}</span>` : `<span style="width:18px;flex-shrink:0"></span>`;
    const toggleIcon = `<span class="group-toggle-icon" data-collapse-group="${collapseKey}" style="color:${isActive?'#fff':color};cursor:pointer">${ICONS.chevronDown}</span>`;
    const html = `<div class="colored-group-block ${isCollapsed?'collapsed':''}" data-col-id="${k}" data-group-block="${setNr}|${k}" style="border-color:${color}${widthStyle}">
      <div class="colored-group-header ${isActive?'active-filter':''}" ${filterTag} style="background:${headerBg};border-bottom-color:${color}">
        ${groupGrip}
        ${toggleIcon}
        <span class="colored-group-name" style="color:${isActive?'#fff':color}">${checkmark}${label}</span>
        <span style="display:inline-flex;align-items:center;gap:4px;margin-left:auto">
          ${editBtn}
          <span class="colored-group-count" style="color:${isActive?'#fff':color};${isActive?'background:rgba(255,255,255,0.25)':''}">${items.length}</span>
        </span>
      </div>
      <div class="colored-group-body">
        ${dropZones}
        ${items.map(t=>taskHTML(t,{hideDate:hideDate, hideGroup1: isG1, hideGroup2: !isG1, draggable: !isDagens, compact: useCompact, showMove: true})).join('')}
        ${emptyHint}
        ${dropZones}
      </div>
    </div>`;
    return {id: k, html};
  }).filter(Boolean);
  const visibleHTML = visibleBlocks.map(b=>b.html).join('');

  let hiddenHTML = '';
  if(hiddenGroups.length){
    const pills = hiddenGroups.map(g=>{
      const cnt = unfilteredCounts[g.id] || 0;
      const fk = g.id === NONE_KEY ? '_none' : g.id;
      return `<button class="hidden-group-pill" data-filter-group="${setNr}|${fk}" style="background:${g.color}1a;color:${g.color};border-color:${g.color}">
        <span class="group-dot" style="background:${g.color}"></span>${escapeHtml(g.name)} <span style="opacity:0.7">(${cnt})</span>
      </button>`;
    }).join('');
    hiddenHTML = `<p class="hidden-groups-label">Skjulte grupper – trykk for å legge til</p>
      <div class="hidden-groups-row">${pills}</div>`;
  }

  // Hvis filteret er aktivt men alle synlige bokser er tomme, vis hint
  let emptyFilterHint = '';
  if(hasFilter && list.length === 0){
    emptyFilterHint = `<div style="padding:18px 14px;text-align:center;font-size:12px;color:var(--text-tertiary)">
      <p style="margin:0 0 6px">Ingen oppgaver i de valgte gruppene</p>
      <button class="filter-clear-btn" id="filter-clear-empty" style="color:var(--text-info)">${ICONS.x} Vis alle</button>
    </div>`;
  }

  if(state.columnsLayout){
    // Sett inn resize-håndtak etter hver kolonne (også siste) – dra håndtaket endrer bredden på kolonnen TIL VENSTRE for håndtaket
    const columnsHTML = visibleBlocks.map((b) => {
      return b.html + `<div class="col-resize-handle" data-col-resize="${b.id}"></div>`;
    }).join('');
    return `<div class="columns-container">${columnsHTML}</div>` + emptyFilterHint + hiddenHTML;
  }
  return visibleHTML + emptyFilterHint + hiddenHTML;
}

function renderDagens(){
  const tv = state.dagensView || 'group1';
  const dagensListFilter = state.dagensListFilter || 'pinned';

  // I Liste-modus: bruk tre-valg filter
  // I andre moduser (Gruppe 1, Gruppe 2, Prioritet): pinnet eller todayFlag
  let list;
  if(tv === 'list'){
    if(dagensListFilter === 'pinned'){
      list = state.tasks.filter(t=>(t.pinned || t.todayFlag) && !t.done && matchesSearch(t) && passesGroupFilter(t));
    } else if(dagensListFilter === 'iphone'){
      list = state.tasks.filter(t=>t.iphoneFlag && !t.done && matchesSearch(t) && passesGroupFilter(t));
    } else { // 'all'
      list = state.tasks.filter(t=>(t.pinned || t.todayFlag || t.iphoneFlag || t.date===todayISO()) && !t.done && matchesSearch(t) && passesGroupFilter(t));
    }
  } else {
    list = state.tasks.filter(t=>(t.pinned || t.todayFlag) && !t.done && matchesSearch(t) && passesGroupFilter(t));
  }

  if(!list.length && (tv === 'list' || tv === 'priority')){
    if(isGroupFilterActive() || (state.searchQuery||'').trim()){
      return `<div class="empty">${ICONS.star}<p>Ingen oppgaver matcher filteret</p></div>`;
    }
    if(tv === 'list' && dagensListFilter === 'iphone'){
      return `<div class="empty">${ICONS.phone}<p>Ingen iPhone-merkede oppgaver enda</p><p style="font-size:11px;margin-top:6px;color:var(--text-tertiary)">Marker en oppgave med iPhone-knappen i registreringen</p></div>`;
    }
    if(tv === 'list' && dagensListFilter === 'all'){
      return `<div class="empty">${ICONS.checks}<p>Ingen oppgaver å vise</p></div>`;
    }
    return `<div class="empty">${ICONS.star}<p>Ingen pinnete oppgaver enda</p><p style="font-size:11px;margin-top:6px;color:var(--text-tertiary)">Trykk på stjernen på en oppgave for å legge den til her</p></div>`;
  }

  if(tv === 'list'){
    const sortFn = (a,b)=>{
      if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
      const pr = prioRank[a.priority]-prioRank[b.priority];
      if(pr !== 0) return pr;
      return (a.date||'9999').localeCompare(b.date||'9999');
    };

    if(dagensListFilter === 'pinned' || dagensListFilter === 'iphone'){
      // Kompakt modus med skille-linjer
      list.sort(sortFn);
      const wovenHTML = weaveDividers(list, t=>taskHTML(t,{draggable:true, compact:true, showMove:true}));
      return wovenHTML + `<button class="add-divider-btn" data-add-divider="1">${ICONS.minus} Sett inn skille-linje</button>`;
    }

    // Alt-modus: tre seksjoner med rammer
    // Prioritet: en oppgave som er BÅDE pinnet og iPhone-merket havner i Pinnete (alternativ A)
    const pinnedList = list.filter(t=>t.pinned).sort(sortFn);
    const iphoneList = list.filter(t=>!t.pinned && t.iphoneFlag).sort(sortFn);
    const restList = list.filter(t=>!t.pinned && !t.iphoneFlag).sort(sortFn);

    let html = '';

    if(pinnedList.length){
      const tasksHTML = pinnedList.map(t=>taskHTML(t, {draggable:true, compact:true, showMove:true})).join('');
      html += renderSection('pinned', 'pinned-section', ICONS.starFilled, 'Pinnete', pinnedList.length, tasksHTML);
    }

    if(iphoneList.length){
      const tasksHTML = iphoneList.map(t=>taskHTML(t, {draggable:true, compact:true, showMove:true})).join('');
      html += renderSection('iphone', 'iphone-section', ICONS.phone, 'iPhone-merkede', iphoneList.length, tasksHTML);
    }

    // Resten-ramme med skille-linjer inni
    if(restList.length || (state.dividers||[]).length){
      const wovenHTML = weaveDividers(restList, t=>taskHTML(t, {draggable:true, compact:true, showMove:true}));
      html += renderSection('rest', 'rest-section', ICONS.listCompact, 'Resten', restList.length, wovenHTML);
    }

    html += `<button class="add-divider-btn" data-add-divider="1">${ICONS.minus} Sett inn skille-linje</button>`;
    return html;
  }

  if(tv === 'priority'){
    const groups = [['high','Høy',1,'#E24B4A','#791F1F'],['med','Medium',2,'#EF9F27','#633806'],['low','Lav',3,'#5DCAA5','#085041']];
    return groups.map(([p,label,num,color,darkText])=>{
      const items = list.filter(t=>t.priority===p);
      if(!items.length) return '';
      const header = `<span class="colored-group-name" style="color:${darkText}"><span style="width:20px;height:20px;border-radius:50%;background:${color};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600">${num}</span>${label}</span>`;
      const body = items.map(t=>taskHTML(t,{draggable:false})).join('');
      return `<div class="colored-group-block" style="border-color:${color}">
        <div class="colored-group-header" style="background:${color}1a;border-bottom-color:${color}">
          ${header}
          <span class="colored-group-count" style="color:${darkText}">${items.length}</span>
        </div>
        <div class="colored-group-body">${body}</div>
      </div>`;
    }).join('');
  }

  return renderGroupView(tv, list, false, {dagens:true});
}

// Veve skille-linjer inn i en liste av oppgaver basert på lagrede posisjoner.
// Oppgavenes 'order' og dividernes 'position' bruker samme tallrom – sortér alle
// elementer flatt på sin posisjonsverdi.
// Bygger HTML for en collapsible seksjon (pinned/iphone/rest).
// key er én av 'pinned', 'iphone', 'rest' – brukes som nøkkel i state.collapsedSections.
function renderSection(key, cssClass, icon, title, count, bodyHTML){
  const isCollapsed = !!(state.collapsedSections && state.collapsedSections[key]);
  return `<div class="${cssClass} ${isCollapsed?'collapsed':''}">
    <div class="${cssClass}-header" data-section-collapse="${key}">
      <span class="section-collapse-toggle">${ICONS.chevronDown}</span>
      ${icon}
      <span class="${cssClass}-title">${title}</span>
      <span class="${cssClass}-count">${count}</span>
    </div>
    <div class="${cssClass}-body">${bodyHTML}</div>
  </div>`;
}

function weaveDividers(taskList, taskRenderer, opts){
  opts = opts || {};
  const dividerList = opts.dividerList || state.dividers || [];
  const dividerKey = opts.dividerKey || 'dividers'; // for å vite hvor add/remove skal lagre
  const elements = [];
  taskList.forEach(t=>elements.push({type:'task', task:t, pos: t.order||0}));
  dividerList.forEach(d=>elements.push({type:'divider', divider:d, pos: d.position||0}));
  // Sorter elementer etter posisjon. Oppgaver uten order kommer etter dividers med order=0.
  elements.sort((a,b)=>{
    if(a.pos !== b.pos) return a.pos - b.pos;
    if(a.type !== b.type) return a.type === 'task' ? -1 : 1;
    return 0;
  });
  return elements.map(el=>{
    if(el.type==='task') return taskRenderer(el.task);
    return `<div class="divider-row" data-divider-id="${el.divider.id}" data-divider-key="${dividerKey}">
      <span class="divider-grip" data-divider-grip="${el.divider.id}">${ICONS.grip}</span>
      <div class="divider-line"></div>
      <button class="divider-remove" data-divider-remove="${el.divider.id}" data-divider-key="${dividerKey}" aria-label="Fjern linje">${ICONS.x}</button>
    </div>`;
  }).join('');
}

function renderIphoneX(){
  const sortFn = (a,b)=>{
    if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
    return (a.id||'').localeCompare(b.id||'');
  };

  // Hierarki – Alternativ A: en oppgave havner kun ett sted, i prioritert rekkefølge:
  // Haster > A > B > C > Pinnet > iPhone
  const filter = state.iphoneXFilter || 'all';
  const baseFilter = t => !t.done && matchesSearch(t);

  const urgentList = state.tasks.filter(t=>t.category==='urgent' && baseFilter(t)).sort(sortFn);
  // I dag-ramme: todayFlag=true, men ikke urgent (Haster har høyere prioritet)
  const todayList = state.tasks.filter(t=>t.todayFlag && t.category!=='urgent' && baseFilter(t)).sort(sortFn);
  // A/B/C: må også ekskludere todayFlag (hvis det skal vises der)
  // Men siden todayFlag er separat (1B) viser vi det som egen ramme. Hierarki:
  // En oppgave med kategori='a' OG todayFlag=true havner i I dag-rammen (siden den er over A)
  const aList = state.tasks.filter(t=>t.category==='a' && !t.todayFlag && baseFilter(t)).sort(sortFn);
  const bList = state.tasks.filter(t=>t.category==='b' && !t.todayFlag && baseFilter(t)).sort(sortFn);
  const cList = state.tasks.filter(t=>t.category==='c' && !t.todayFlag && baseFilter(t)).sort(sortFn);
  // Pinnet: ikke har en kategori, ikke todayFlag
  const pinnedList = state.tasks.filter(t=>t.pinned && !t.todayFlag && (t.category==='none' || !t.category) && baseFilter(t)).sort(sortFn);
  // iPhone-merket: ikke pinnet, ikke todayFlag, ikke kategori
  const iphoneList = state.tasks.filter(t=>!t.pinned && !t.todayFlag && t.iphoneFlag && (t.category==='none' || !t.category) && baseFilter(t)).sort(sortFn);

  const renderRow = (t, color) => {
    const contactTag = (t.contact||'').trim() ? `<div class="iphonex-contact">${ICONS.user}<span>${escapeHtml(t.contact)}</span></div>` : '';
    return `<div class="iphonex-row" data-iphonex-edit="${t.id}" data-id="${t.id}">
      <button class="iphonex-grip" data-iphonex-grip="${t.id}" aria-label="Dra for å flytte">${ICONS.grip}</button>
      <div style="flex:1;min-width:0">
        ${contactTag}
        <span class="iphonex-title">${escapeHtml(t.title||'')}</span>
      </div>
      <span class="iphonex-number" style="${color}">${t.number||''}</span>
    </div>`;
  };

  // Filter-rad øverst
  const filterRow = `<div class="iphonex-filter-row">
    <span class="iphonex-filter-label">Vis:</span>
    <button class="cat-btn cat-all ${filter==='all'?'active':''}" data-iphonex-filter="all">Alle</button>
    <button class="cat-btn cat-urgent ${filter==='urgent'?'active':''}" data-iphonex-filter="urgent">Haster</button>
    <button class="cat-btn cat-today ${filter==='today'?'active':''}" data-iphonex-filter="today">${ICONS.sun}<span>I dag</span></button>
    <button class="cat-btn cat-a ${filter==='a'?'active':''}" data-iphonex-filter="a">A</button>
    <button class="cat-btn cat-b ${filter==='b'?'active':''}" data-iphonex-filter="b">B</button>
    <button class="cat-btn cat-c ${filter==='c'?'active':''}" data-iphonex-filter="c">C</button>
    <button class="cat-btn cat-pinned ${filter==='pinned'?'active':''}" data-iphonex-filter="pinned">${ICONS.star} Pinnet</button>
    <button class="cat-btn cat-iphone ${filter==='iphone'?'active':''}" data-iphonex-filter="iphone">${ICONS.phone} iPhone</button>
  </div>`;

  // Bygg seksjons-HTML hver for seg
  const buildSection = (cssClass, headerIcon, title, titleClass, list, dividerKey, rowColor, collapseKey, sectionTarget) => {
    const woven = weaveDividers(list, t=>renderRow(t, rowColor), {
      dividerList: state[dividerKey] || [],
      dividerKey: dividerKey
    });
    const isCollapsed = !!(state.collapsedSections && state.collapsedSections[collapseKey]);
    return `<div class="${cssClass} ${isCollapsed?'collapsed':''}" data-section-target="${sectionTarget}">
      <div class="${cssClass}-header" data-section-collapse="${collapseKey}">
        <span class="section-collapse-toggle">${ICONS.chevronDown}</span>
        ${headerIcon}
        <span class="${cssClass}-title">${title}</span>
        <span class="${cssClass}-count">${list.length}</span>
      </div>
      <div class="${cssClass}-body">
        <div class="iphonex-body ${titleClass}">${woven || ''}</div>
        <div style="padding:6px 10px">
          <button class="add-divider-btn" data-add-divider="${dividerKey}">${ICONS.minus} Sett inn skille-linje</button>
        </div>
      </div>
    </div>`;
  };

  // Avgjør hvilke seksjoner som skal vises basert på filter
  // Filter-raden (A) overstyrer alltid hidden-listen - skjult ramme vises likevel hvis valgt eksplisitt
  const hidden = state.iphoneXHidden || [];
  const isHiddenInList = (key) => filter === 'all' && hidden.includes(key);
  const showUrgent = (filter==='all' || filter==='urgent') && urgentList.length > 0 && !isHiddenInList('urgent');
  const showToday = (filter==='all' || filter==='today') && todayList.length > 0 && !isHiddenInList('today');
  const showA = (filter==='all' || filter==='a') && aList.length > 0 && !isHiddenInList('a');
  const showB = (filter==='all' || filter==='b') && bList.length > 0 && !isHiddenInList('b');
  const showC = (filter==='all' || filter==='c') && cList.length > 0 && !isHiddenInList('c');
  const showPinned = (filter==='all' || filter==='pinned') && pinnedList.length > 0 && !isHiddenInList('pinned');
  const showIphone = (filter==='all' || filter==='iphone') && iphoneList.length > 0 && !isHiddenInList('iphone');

  // Kontroll-knapper: Lukk alle / Åpne alle + Velg rammer
  const collapseKeys = [];
  if(showUrgent) collapseKeys.push('urgent');
  if(showToday) collapseKeys.push('today');
  if(showA) collapseKeys.push('a');
  if(showB) collapseKeys.push('b');
  if(showC) collapseKeys.push('c');
  if(showPinned) collapseKeys.push('pinned');
  if(showIphone) collapseKeys.push('iphone');
  const collapsedSections = state.collapsedSections || {};
  const allCollapsed = collapseKeys.length > 0 && collapseKeys.every(k=>collapsedSections[k]);
  const toggleLabel = allCollapsed ? 'Åpne alle' : 'Lukk alle';
  const toggleIcon = allCollapsed ? ICONS.chevronDown : ICONS.chevronUp;
  const visibleCount = 7 - hidden.length;
  const controls = `<div class="alle-group-controls">
    <button class="alle-group-ctrl-btn primary" data-iphonex-toggle-all>${toggleIcon}<span>${toggleLabel}</span></button>
    <button class="alle-group-ctrl-btn" data-iphonex-pick-frames>${ICONS.filter}<span>Velg rammer (${visibleCount}/7)</span></button>
  </div>`;

  let body = '';

  if(showUrgent) body += buildSection('urgent-section', ICONS.warning, 'Haster', 'iphonex-body-urgent', urgentList, 'dividersIphoneXUrgent', 'color:#FF8080;background:rgba(226,75,74,0.15)', 'urgent', 'urgent');
  if(showToday) body += buildSection('today-section', ICONS.sun, 'I dag', 'iphonex-body-today', todayList, 'dividersIphoneXToday', 'color:#5DDFF1;background:rgba(0,180,219,0.15)', 'today', 'today');
  if(showA) body += buildSection('cat-a-section', `<span class="cat-letter-badge cat-a-badge">A</span>`, 'A', 'iphonex-body-a', aList, 'dividersIphoneXA', 'color:#FAC775;background:rgba(239,159,39,0.15)', 'a', 'a');
  if(showB) body += buildSection('cat-b-section', `<span class="cat-letter-badge cat-b-badge">B</span>`, 'B', 'iphonex-body-b', bList, 'dividersIphoneXB', 'color:#AED183;background:rgba(99,153,34,0.15)', 'b', 'b');
  if(showC) body += buildSection('cat-c-section', `<span class="cat-letter-badge cat-c-badge">C</span>`, 'C', 'iphonex-body-c', cList, 'dividersIphoneXC', 'color:#B5AEF0;background:rgba(127,119,221,0.15)', 'c', 'c');
  if(showPinned) body += buildSection('pinned-section', ICONS.starFilled, 'Pinnete', 'iphonex-body-pinned', pinnedList, 'dividersIphoneXPinned', 'color:#FAC775;background:rgba(239,159,39,0.12)', 'pinned', 'pinned');
  if(showIphone) body += buildSection('iphone-section', ICONS.phone, 'iPhone-merkede', '', iphoneList, 'dividersIphoneXIphone', '', 'iphone', 'iphone');

  if(!body){
    let msg;
    if(filter==='all') msg = 'Ingen oppgaver i iPhone X enda';
    else if(filter==='urgent') msg = 'Ingen oppgaver merket Haster';
    else if(filter==='today') msg = 'Ingen oppgaver merket for I dag';
    else if(filter==='pinned') msg = 'Ingen pinnete oppgaver';
    else if(filter==='iphone') msg = 'Ingen iPhone-merkede oppgaver';
    else msg = `Ingen oppgaver merket ${filter.toUpperCase()}`;
    body = `<div class="empty">${ICONS.phone}<p>${msg}</p><p style="font-size:11px;margin-top:6px;color:var(--text-tertiary)">Sett kategori i registreringsskjemaet eller bruk stjerne / mobil-emblem</p></div>`;
  }

  return filterRow + controls + body;
}

function renderIphone(){
  // Oppgaver: dagens dato ELLER iphoneFlag = true, ikke ferdige
  const today = todayISO();
  const lf = state.iphoneListFilter || 'all';
  // Grunnsett: dagens dato + iPhone-merkede + pinnet (i Liste-modus med Alt)
  // I Gruppe 2-modus: dagens + iPhone-merkede (som før)
  let list;
  const iv = state.iphoneView || 'list';
  if(iv === 'list'){
    if(lf === 'pinned'){
      list = state.tasks.filter(t=>t.pinned && !t.done && matchesSearch(t) && passesGroupFilter(t));
    } else if(lf === 'iphone'){
      list = state.tasks.filter(t=>t.iphoneFlag && !t.done && matchesSearch(t) && passesGroupFilter(t));
    } else { // 'all'
      list = state.tasks.filter(t=>(t.date===today || t.iphoneFlag || t.pinned) && !t.done && matchesSearch(t) && passesGroupFilter(t));
    }
  } else {
    // Gruppe 2-modus: alltid dagens + iPhone-merkede
    list = state.tasks.filter(t=>(t.date===today || t.iphoneFlag) && !t.done && matchesSearch(t) && passesGroupFilter(t));
  }

  if(iv === 'group2'){
    const sortedList = list.sort((a,b)=>{
      if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
      const pr = prioRank[a.priority]-prioRank[b.priority];
      if(pr !== 0) return pr;
      return (a.id||'').localeCompare(b.id||'');
    });
    return renderGroupView('group2', sortedList, true, {iphone:true, forceCompact:true});
  }

  // Liste-modus
  const sortFn = (a,b)=>{
    if((a.order||0) !== (b.order||0)) return (a.order||0) - (b.order||0);
    const pr = prioRank[a.priority]-prioRank[b.priority];
    if(pr !== 0) return pr;
    return (a.id||'').localeCompare(b.id||'');
  };

  let html = '';

  if(lf === 'all'){
    // Tre seksjoner: Pinnete, iPhone-merkede, og resten (alle med rammer)
    // Alternativ A: oppgaver som er BÅDE pinnet og iPhone-merket havner i Pinnete
    const pinnedList = list.filter(t=>t.pinned).sort(sortFn);
    const iphoneList = list.filter(t=>!t.pinned && t.iphoneFlag).sort(sortFn);
    const otherList = list.filter(t=>!t.pinned && !t.iphoneFlag).sort(sortFn);

    if(pinnedList.length){
      const tasksHTML = pinnedList.map(t=>taskHTML(t, {hideDate:true, draggable:true, compact:true, showMove:true})).join('');
      html += renderSection('pinned', 'pinned-section', ICONS.starFilled, 'Pinnete', pinnedList.length, tasksHTML);
    }

    if(iphoneList.length){
      const iphoneTasksHTML = iphoneList.map(t=>taskHTML(t, {hideDate:true, draggable:true, compact:true, showMove:true})).join('');
      html += renderSection('iphone', 'iphone-section', ICONS.phone, 'iPhone-merkede', iphoneList.length, iphoneTasksHTML);
    }

    // Resten-ramme med skille-linjer inni
    if(otherList.length || (state.dividers||[]).length){
      const wovenHTML = weaveDividers(otherList, t=>taskHTML(t, {hideDate:true, draggable:true, compact:true, showMove:true}));
      html += renderSection('rest', 'rest-section', ICONS.listCompact, 'Resten', otherList.length, wovenHTML);
    }
  } else {
    // Pinnet eller iPhone – flat liste med skille-linjer
    list.sort(sortFn);
    const wovenHTML = weaveDividers(list, t=>taskHTML(t, {hideDate:true, draggable:true, compact:true, showMove:true}));
    html = wovenHTML;
  }

  if(!html){
    let msg = 'Ingen oppgaver i iPhone-fanen';
    if(lf === 'pinned') msg = 'Ingen pinnete oppgaver enda';
    else if(lf === 'iphone') msg = 'Ingen iPhone-merkede oppgaver enda';
    html = `<div class="empty">${ICONS.phone}<p>${msg}</p></div>`;
  }

  // Skille-linje-knappen vises i alle modus nå
  const dividerBtn = `<button class="add-divider-btn" data-add-divider="1">${ICONS.minus} Sett inn skille-linje</button>`;
  return html + dividerBtn;
}

function wireDividers(){
  document.querySelectorAll('[data-add-divider]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const key = b.dataset.addDivider; // '1' (default) eller f.eks. 'dividersIphoneXPinned'
      const listKey = (key === '1' || !key) ? 'dividers' : key;
      if(!state[listKey]) state[listKey] = [];
      const maxPos = state[listKey].reduce((m,d)=>Math.max(m, d.position||0), 0);
      state[listKey].push({id: uid('d'), position: maxPos + 100});
      save(); render();
    });
  });
  document.querySelectorAll('[data-divider-remove]').forEach(b=>{
    b.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = b.dataset.dividerRemove;
      const key = b.dataset.dividerKey || 'dividers';
      state[key] = (state[key]||[]).filter(d=>d.id !== id);
      save(); render();
    });
  });
  // Dra-håndtak for skille-linjer – flytter linjen opp/ned i miksen av oppgaver + skille-linjer
  document.querySelectorAll('[data-divider-grip]').forEach(grip=>{
    let dragState = null;
    const startDrag = (clientX, clientY, isTouch) => {
      const row = grip.closest('.divider-row');
      if(!row) return;
      const id = row.dataset.dividerId;
      const rect = row.getBoundingClientRect();
      const ghost = row.cloneNode(true);
      ghost.style.position = 'fixed';
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      ghost.style.width = rect.width + 'px';
      ghost.style.pointerEvents = 'none';
      ghost.style.opacity = '0.85';
      ghost.style.zIndex = '999';
      ghost.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
      document.body.appendChild(ghost);
      row.classList.add('dragging');
      if(isTouch && navigator.vibrate) navigator.vibrate(20);
      dragState = { id, row, ghost, offsetY: clientY - rect.top, lastTarget: null, lastPosition: null };
    };
    const moveDrag = (clientX, clientY) => {
      if(!dragState) return;
      dragState.ghost.style.top = (clientY - dragState.offsetY) + 'px';
      dragState.ghost.style.display = 'none';
      const under = document.elementFromPoint(clientX, clientY);
      dragState.ghost.style.display = '';
      if(dragState.lastTarget){
        dragState.lastTarget.classList.remove('sort-drop-target-above','sort-drop-target-below');
      }
      // Mål: en oppgave (.task), en iPhone X-rad eller en annen skille-linje
      const targetEl = under ? (under.closest('.task') || under.closest('.iphonex-row') || under.closest('.divider-row')) : null;
      if(!targetEl || targetEl === dragState.row){ dragState.lastTarget = null; return; }
      const tRect = targetEl.getBoundingClientRect();
      const above = clientY < (tRect.top + tRect.height/2);
      targetEl.classList.add(above ? 'sort-drop-target-above' : 'sort-drop-target-below');
      dragState.lastTarget = targetEl;
      dragState.lastPosition = above ? 'above' : 'below';
    };
    const endDrag = () => {
      if(!dragState) return;
      const s = dragState;
      if(s.ghost && s.ghost.parentNode) s.ghost.parentNode.removeChild(s.ghost);
      s.row.classList.remove('dragging');
      if(s.lastTarget){
        s.lastTarget.classList.remove('sort-drop-target-above','sort-drop-target-below');
        reorderDivider(s.id, s.lastTarget, s.lastPosition);
      }
      dragState = null;
    };
    grip.addEventListener('mousedown',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      startDrag(e.clientX, e.clientY, false);
      const onMove = (ev)=>moveDrag(ev.clientX, ev.clientY);
      const onUp = ()=>{
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        endDrag();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    grip.addEventListener('touchstart',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      const t = e.touches[0];
      startDrag(t.clientX, t.clientY, true);
      const onMove = (ev)=>{
        if(!ev.touches[0]) return;
        ev.preventDefault();
        moveDrag(ev.touches[0].clientX, ev.touches[0].clientY);
      };
      const onEnd = ()=>{
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        document.removeEventListener('touchcancel', onEnd);
        endDrag();
      };
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('touchend', onEnd, {passive:true});
      document.addEventListener('touchcancel', onEnd, {passive:true});
    }, {passive:false});
  });
}

// Renummerere posisjoner på dividers og oppgaver basert på rekkefølgen i DOM-en.
// Brukes etter omplassering av en skille-linje eller en oppgave i list-visning.
function renumberSequence(dividerId, dropTarget, dropPosition){
  // Bygg en flat liste over hva som er i strømmen nå
  // dropTarget kan være en .task eller en .divider-row
  // Vi henter alle elementer som har data-id (task) eller data-divider-id (divider) i renderet rekkefølge
  // og lager nye position-verdier som er stabile
  const all = Array.from(document.querySelectorAll('.task, .divider-row'));
  // Bygg en oppslagstruktur: tasks etter id, dividers etter id
  const tasks = {};
  (state.tasks||[]).forEach(t=>{ tasks[t.id] = t; });
  const dividers = {};
  (state.dividers||[]).forEach(d=>{ dividers[d.id] = d; });
  return {all, tasks, dividers};
}

function findDividerAnywhere(id){
  const lists = ['dividers','dividersIphoneXPinned','dividersIphoneXIphone','dividersIphoneXUrgent','dividersIphoneXToday','dividersIphoneXA','dividersIphoneXB','dividersIphoneXC'];
  for(const k of lists){
    const arr = state[k] || [];
    const d = arr.find(x=>x.id===id);
    if(d) return d;
  }
  return null;
}

function reorderDivider(srcId, targetEl, position){
  const src = findDividerAnywhere(srcId);
  if(!src) return;
  // Bygg en flat liste over alle elementer i dom-rekkefølge
  const all = Array.from(document.querySelectorAll('.task, .iphonex-row, .divider-row'));
  // Bygg sortert "logisk" sekvens
  const sequence = all.map(el=>{
    if(el.classList.contains('divider-row')) return {type:'divider', id: el.dataset.dividerId};
    if(el.classList.contains('iphonex-row')) return {type:'task', id: el.dataset.iphonexEdit};
    return {type:'task', id: el.dataset.id};
  });
  // Fjern src fra sekvensen
  const srcIdx = sequence.findIndex(it=>it.type==='divider' && it.id===srcId);
  if(srcIdx < 0) return;
  sequence.splice(srcIdx, 1);
  // Finn target i sekvensen
  const targetIsDivider = targetEl.classList.contains('divider-row');
  const targetIsIphonex = targetEl.classList.contains('iphonex-row');
  const targetId = targetIsDivider ? targetEl.dataset.dividerId : (targetIsIphonex ? targetEl.dataset.iphonexEdit : targetEl.dataset.id);
  const targetType = targetIsDivider ? 'divider' : 'task';
  const tgtIdx = sequence.findIndex(it=>it.type===targetType && it.id===targetId);
  if(tgtIdx < 0) return;
  const insertAt = position === 'below' ? tgtIdx + 1 : tgtIdx;
  sequence.splice(insertAt, 0, {type:'divider', id: srcId});
  // Renummerer ALLE elementer slik at deres posisjon stemmer
  applySequencePositions(sequence);
  save(); render();
}

function reorderTaskInSequence(srcId, targetEl, position){
  const src = (state.tasks||[]).find(t=>t.id===srcId);
  if(!src) return;
  const all = Array.from(document.querySelectorAll('.task, .divider-row'));
  const sequence = all.map(el=>{
    if(el.classList.contains('divider-row')) return {type:'divider', id: el.dataset.dividerId};
    return {type:'task', id: el.dataset.id};
  });
  const srcIdx = sequence.findIndex(it=>it.type==='task' && it.id===srcId);
  if(srcIdx < 0) return;
  sequence.splice(srcIdx, 1);
  const targetIsDivider = targetEl.classList.contains('divider-row');
  const targetId = targetIsDivider ? targetEl.dataset.dividerId : targetEl.dataset.id;
  const targetType = targetIsDivider ? 'divider' : 'task';
  const tgtIdx = sequence.findIndex(it=>it.type===targetType && it.id===targetId);
  if(tgtIdx < 0) return;
  const insertAt = position === 'below' ? tgtIdx + 1 : tgtIdx;
  sequence.splice(insertAt, 0, {type:'task', id: srcId});
  applySequencePositions(sequence);
  save(); render();
}

function applySequencePositions(sequence){
  sequence.forEach((it, idx)=>{
    const pos = (idx + 1) * 10;
    if(it.type === 'task'){
      const t = (state.tasks||[]).find(x=>x.id===it.id);
      if(t) t.order = pos;
    } else {
      const d = findDividerAnywhere(it.id);
      if(d) d.position = pos;
    }
  });
}

        </div>
        ${items.map(t=>taskHTML(t,{hideDate:false,draggable:false})).join('')}
      </div>`;
    }).join('');
    followUpHTML = `<div class="colored-group-block" style="border-color:var(--accent);margin-top:16px">
      <div class="colored-group-header" style="background:var(--bg-info);border-bottom-color:var(--accent)">
        <span class="colored-group-name" style="color:var(--text-info)">${ICONS.calendarEvent} Fremtidige oppfølginger</span>
        <span class="colored-group-count" style="color:var(--text-info)">${followUps.length}</span>
      </div>
      <div class="colored-group-body">${inner}</div>
    </div>`;
  }
  return weekHTML + followUpHTML;
}

function renderGroupedRow(t, currentSetNr){
