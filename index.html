  modal.querySelector('#vis-done-ix').addEventListener('click',()=>{
    modal.remove();
    render();
  });
  modal.querySelector('[data-modal-close]').addEventListener('click',()=>{
    modal.remove();
    render();
  });
  modal.addEventListener('click',(e)=>{
    if(e.target === modal){
      modal.remove();
      render();
    }
  });
}

function openAlleGroupVisibilityModal(setNr){
  // Lukk gammel modal hvis åpen
  const existing = document.getElementById('alle-group-visibility-modal');
  if(existing) existing.remove();
  const groupSet = setNr === 1 ? state.groups1 : state.groups2;
  const hiddenKey = setNr === 1 ? 'alleGroup1Hidden' : 'alleGroup2Hidden';
  const hiddenList = state[hiddenKey] || [];
  const sortedGroups = [...groupSet].sort((a,b)=>a.name.localeCompare(b.name, 'nb', {sensitivity:'base'}));

  const taskGroupKey = setNr === 1 ? 'group1Id' : 'group2Id';
  const counts = {};
  state.tasks.forEach(t=>{
    if(t.done) return;
    const gid = t[taskGroupKey] || '_none';
    counts[gid] = (counts[gid]||0) + 1;
  });

  const modal = document.createElement('div');
  modal.id = 'alle-group-visibility-modal';
  modal.className = 'modal-overlay';
  modal.innerHTML = `<div class="modal-content" style="max-width:340px">
    <div class="modal-header">
      ${ICONS.filter}
      <span class="modal-title">Velg grupper å vise (Gruppe ${setNr})</span>
      <button class="modal-close" data-modal-close>${ICONS.x}</button>
    </div>
    <div style="display:flex;gap:6px;padding:8px 12px;border-bottom:0.5px solid var(--border-tertiary)">
      <button class="alle-group-ctrl-btn" data-vis-select-all style="flex:1;justify-content:center">Velg alle</button>
      <button class="alle-group-ctrl-btn" data-vis-deselect-all style="flex:1;justify-content:center">Fjern alle</button>
    </div>
    <div class="group-picker-search" style="margin:6px 8px 4px">
      ${ICONS.search}
      <input type="text" class="group-picker-input" id="vis-search" placeholder="Søk..." autocomplete="off" />
    </div>
    <div class="vis-list-container" style="max-height:300px;overflow-y:auto;padding:0 8px 8px">
      ${sortedGroups.map(g=>{
        const isVisible = !hiddenList.includes(g.id);
        const count = counts[g.id] || 0;
        return `<label class="vis-row" data-vis-item="${g.id}" data-name="${escapeAttr(g.name.toLowerCase())}" style="border-left:3px solid ${g.color}">
          <div class="vis-check ${isVisible?'checked':''}" style="${isVisible?`background:${g.color};border-color:${g.color}`:''}">${isVisible?ICONS.check:''}</div>
          <span class="vis-name" style="${isVisible?'':'color:var(--text-tertiary)'}">${escapeHtml(g.name)}</span>
          <span class="vis-count">${count}</span>
        </label>`;
      }).join('')}
      ${(()=>{
        const isVisible = !hiddenList.includes('_none');
        const count = counts['_none'] || 0;
        return `<label class="vis-row" data-vis-item="_none" data-name="uten gruppe" style="border-left:3px solid #888780">
          <div class="vis-check ${isVisible?'checked':''}" style="${isVisible?'background:#888780;border-color:#888780':''}">${isVisible?ICONS.check:''}</div>
          <span class="vis-name" style="${isVisible?'':'color:var(--text-tertiary)'}">Uten gruppe</span>
          <span class="vis-count">${count}</span>
        </label>`;
      })()}
    </div>
    <div style="padding:8px 12px;border-top:0.5px solid var(--border-tertiary)">
      <button class="fab-btn primary" id="vis-done" style="width:100%">Ferdig</button>
    </div>
  </div>`;
  document.body.appendChild(modal);

  const refreshCount = () => {
    const total = sortedGroups.length + 1;
    const hidden = (state[hiddenKey] || []).length;
    const visible = total - hidden;
    const doneBtn = modal.querySelector('#vis-done');
    if(doneBtn) doneBtn.textContent = `Ferdig (${visible} valgt)`;
  };
  refreshCount();

  modal.querySelectorAll('[data-vis-item]').forEach(row=>{
    row.addEventListener('click',(e)=>{
      e.preventDefault();
      const id = row.dataset.visItem;
      let list = state[hiddenKey] || [];
      if(list.includes(id)){
        // Var skjult – gjør synlig
        list = list.filter(x=>x!==id);
      } else {
        // Var synlig – skjul
        list = [...list, id];
      }
      state[hiddenKey] = list;
      // Oppdater radens utseende
      const check = row.querySelector('.vis-check');
      const name = row.querySelector('.vis-name');
      const isVisible = !list.includes(id);
      let color;
      if(id === '_none') color = '#888780';
      else {
        const g = groupSet.find(x=>x.id===id);
        color = g ? g.color : '#888780';
      }
      if(isVisible){
        check.classList.add('checked');
        check.style.background = color;
        check.style.borderColor = color;
        check.innerHTML = ICONS.check;
        name.style.color = '';
      } else {
        check.classList.remove('checked');
        check.style.background = '';
        check.style.borderColor = '';
        check.innerHTML = '';
        name.style.color = 'var(--text-tertiary)';
      }
      refreshCount();
      save();
    });
  });

  modal.querySelector('[data-vis-select-all]').addEventListener('click',(e)=>{
    e.stopPropagation();
    state[hiddenKey] = [];
    save();
    modal.remove();
    openAlleGroupVisibilityModal(setNr); // re-åpne med fersk state
  });
  modal.querySelector('[data-vis-deselect-all]').addEventListener('click',(e)=>{
    e.stopPropagation();
    state[hiddenKey] = [...sortedGroups.map(g=>g.id), '_none'];
    save();
    modal.remove();
    openAlleGroupVisibilityModal(setNr);
  });

  // Søk i listen
  const searchInput = modal.querySelector('#vis-search');
  if(searchInput){
    searchInput.addEventListener('input',()=>{
      const q = searchInput.value.trim().toLowerCase();
      modal.querySelectorAll('.vis-row').forEach(row=>{
        const name = row.dataset.name || '';
        row.style.display = (!q || name.includes(q)) ? '' : 'none';
      });
    });
  }

  modal.querySelector('#vis-done').addEventListener('click',()=>{
    modal.remove();
    render();
  });
  modal.querySelector('[data-modal-close]').addEventListener('click',()=>{
    modal.remove();
    render();
  });
  modal.addEventListener('click',(e)=>{
    if(e.target === modal){
      modal.remove();
      render();
    }
  });
}

function openGroupChangePicker(taskId, setNr, anchor){
  const existing = document.querySelector('.tab-menu');
  if(existing) existing.remove();
  const t = state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  const groupSet = setNr === 1 ? state.groups1 : state.groups2;
  const currentId = setNr === 1 ? t.group1Id : t.group2Id;
  const sortedGroups = [...groupSet].sort((a,b)=>a.name.localeCompare(b.name, 'nb', {sensitivity:'base'}));

  const menu = document.createElement('div');
  menu.className = 'tab-menu group-picker-menu';
  menu.innerHTML = `
    <div class="group-picker-search">
      ${ICONS.search}
      <input type="text" class="group-picker-input" placeholder="Søk i grupper..." autocomplete="off" />
      <button class="group-picker-clear" aria-label="Tøm">${ICONS.x}</button>
    </div>
    <div class="group-picker-list"></div>
    <div class="group-picker-count"></div>
  `;
  document.body.appendChild(menu);
  const rect = anchor.getBoundingClientRect();
  menu.style.position = 'fixed';
  menu.style.zIndex = '1000';
  // Horisontal plassering: hold innenfor høyre kant
  menu.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 240)) + 'px';
  // Vertikal plassering settes etter at innholdet er rendret (via positionMenu)
  menu.style.top = '0px';
  menu.style.visibility = 'hidden';

  const input = menu.querySelector('.group-picker-input');
  const clearBtn = menu.querySelector('.group-picker-clear');
  const listEl = menu.querySelector('.group-picker-list');
  const countEl = menu.querySelector('.group-picker-count');

  const highlightMatch = (name, query) => {
    if(!query) return escapeHtml(name);
    const lower = name.toLowerCase();
    const q = query.toLowerCase();
    const idx = lower.indexOf(q);
    if(idx === -1) return escapeHtml(name);
    return escapeHtml(name.slice(0,idx)) + '<mark>' + escapeHtml(name.slice(idx,idx+q.length)) + '</mark>' + escapeHtml(name.slice(idx+q.length));
  };

  const renderList = (query) => {
    const q = (query||'').trim().toLowerCase();
    let items = [];
    let createBtnHTML = '';

    if(q){
      const matched = sortedGroups.filter(g=>g.name.toLowerCase().includes(q));
      items = matched.map(g=>`<button class="tab-menu-item ${currentId===g.id?'active':''}" data-pick-group="${g.id}" style="border-left:3px solid ${g.color}">${highlightMatch(g.name, q)}</button>`);
      countEl.textContent = `${matched.length} av ${sortedGroups.length} grupper`;
      countEl.style.display = 'block';

      // Vis "Opprett <søk>" hvis:
      // - søk er minst 2 tegn
      // - ingen eksakt match finnes (case-insensitiv)
      const exactMatch = sortedGroups.some(g=>g.name.toLowerCase() === q);
      if(query.trim().length >= 2 && !exactMatch){
        const cleanName = query.trim();
        createBtnHTML = `<button class="tab-menu-item group-picker-create" data-create-group="${escapeAttr(cleanName)}">${ICONS.plus}<span>Opprett "${escapeHtml(cleanName)}"</span></button>`;
      }
    } else {
      items = [
        `<button class="tab-menu-item ${!currentId?'active':''}" data-pick-group="">— Uten gruppe</button>`,
        ...sortedGroups.map(g=>`<button class="tab-menu-item ${currentId===g.id?'active':''}" data-pick-group="${g.id}" style="border-left:3px solid ${g.color}">${escapeHtml(g.name)}</button>`)
      ];
      countEl.style.display = 'none';
    }
    listEl.innerHTML = createBtnHTML + items.join('');
    listEl.querySelectorAll('[data-pick-group]').forEach(item=>{
      item.addEventListener('click',(e)=>{
        e.stopPropagation();
        const newId = item.dataset.pickGroup || null;
        if(setNr === 1) t.group1Id = newId;
        else t.group2Id = newId;
        menu.remove();
        save(); render();
        showToast('Gruppe oppdatert');
      });
    });
    listEl.querySelectorAll('[data-create-group]').forEach(btn=>{
      btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        const name = btn.dataset.createGroup;
        // Velg neste ledige farge fra paletten
        const usedColors = new Set(groupSet.map(g=>g.color));
        let color = COLORS.find(c=>!usedColors.has(c));
        if(!color) color = COLORS[groupSet.length % COLORS.length];
        const newGroup = {
          id: uid('g'),
          name: name,
          color: color,
          order: (groupSet.length ? Math.max(...groupSet.map(g=>g.order||0)) + 1 : 0)
        };
        if(setNr === 1) state.groups1.push(newGroup);
        else state.groups2.push(newGroup);
        // Koble oppgaven til den nye gruppen
        if(setNr === 1) t.group1Id = newGroup.id;
        else t.group2Id = newGroup.id;
        menu.remove();
        save(); render();
        showToast(`Opprettet "${name}" og koblet til oppgaven`);
      });
    });
  };

  // Smart vertikal plassering: under hvis det er plass, ellers over
  const positionMenu = () => {
    const menuHeight = menu.offsetHeight;
    const spaceBelow = window.innerHeight - rect.bottom - 8;
    const spaceAbove = rect.top - 8;
    if(menuHeight <= spaceBelow || spaceBelow >= spaceAbove){
      // Plass nederst – eller mer plass nederst enn øverst
      menu.style.top = (rect.bottom + 4) + 'px';
      if(menuHeight > spaceBelow){
        const list = menu.querySelector('.group-picker-list');
        if(list){
          const otherHeight = menuHeight - list.offsetHeight;
          list.style.maxHeight = Math.max(80, spaceBelow - otherHeight - 8) + 'px';
        }
      }
    } else {
      // Plassér over badgen
      let top = rect.top - menuHeight - 4;
      if(top < 8){
        const list = menu.querySelector('.group-picker-list');
        if(list){
          const otherHeight = menuHeight - list.offsetHeight;
          list.style.maxHeight = Math.max(80, spaceAbove - otherHeight - 8) + 'px';
        }
        top = rect.top - menu.offsetHeight - 4;
        if(top < 8) top = 8;
      }
      menu.style.top = top + 'px';
    }
    menu.style.visibility = '';
  };

  renderList('');
  requestAnimationFrame(positionMenu);

  input.addEventListener('input',()=>{
    renderList(input.value);
    clearBtn.style.visibility = input.value ? 'visible' : 'hidden';
  });
  clearBtn.style.visibility = 'hidden';
  clearBtn.addEventListener('click',(e)=>{
    e.stopPropagation();
    input.value = '';
    renderList('');
    clearBtn.style.visibility = 'hidden';
    input.focus();
  });

  // Auto-focus med liten forsinkelse så popup vises før tastatur popper opp
  setTimeout(()=>input.focus(), 50);

  setTimeout(()=>{
    const closer = (ev)=>{
      if(!menu.contains(ev.target)){
        menu.remove();
        document.removeEventListener('click', closer);
      }
    };
    document.addEventListener('click', closer);
  }, 0);
}

function openTabMenu(group, anchor){
  // Lukk gammel meny hvis åpen
  const existing = document.querySelector('.tab-menu');
  if(existing){ existing.remove(); return; }
  let items = [];
  if(group === 'today') items = [{view:'today',label:'I dag'},{view:'dagens',label:'Dagens'}];
  else if(group === 'iphone') items = [{view:'iphonex',label:'iPhone X'},{view:'iphone',label:'iPhone'}];
  else if(group === 'done') items = [{view:'done',label:'Ferdig'},{view:'deleted',label:'Slettede'}];
  const menu = document.createElement('div');
  menu.className = 'tab-menu';
  menu.innerHTML = items.map(it=>`<button class="tab-menu-item ${state.view===it.view?'active':''}" data-tab-pick="${it.view}">${escapeHtml(it.label)}</button>`).join('');
  document.body.appendChild(menu);
  const rect = anchor.getBoundingClientRect();
  menu.style.position = 'fixed';
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.left = Math.max(8, rect.left - 30) + 'px';
  menu.style.zIndex = '1000';
  menu.querySelectorAll('[data-tab-pick]').forEach(b=>{
    b.addEventListener('click',()=>{
      state.view = b.dataset.tabPick;
      menu.remove();
      save(); render();
    });
  });
  // Lukk på klikk utenfor
  setTimeout(()=>{
    const closer = (ev)=>{
      if(!menu.contains(ev.target)){
        menu.remove();
        document.removeEventListener('click', closer);
      }
    };
    document.addEventListener('click', closer);
  }, 0);
}

// Søk
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const searchIconHost = document.getElementById('search-icon-host');
searchIconHost.innerHTML = ICONS.search;
searchClear.innerHTML = ICONS.x;
searchInput.value = state.searchQuery || '';
searchClear.style.display = state.searchQuery ? '' : 'none';
let searchTimer;
searchInput.addEventListener('input',e=>{
  state.searchQuery = e.target.value;
  searchClear.style.display = state.searchQuery ? '' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{ save(); render(); }, 120);
});
searchClear.addEventListener('click',()=>{
  state.searchQuery = '';
  searchInput.value = '';
  searchClear.style.display = 'none';
  save(); render();
  searchInput.focus();
});

render();
})();
</script>
